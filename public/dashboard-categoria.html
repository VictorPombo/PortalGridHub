<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel da Categoria — Driver News</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/carbon.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="carbon-bg">
<div class="toast-wrap" id="toastWrap"></div>
<nav class="carbon-subtle">
  <div class="nav-inner">
    <a class="logo" href="index.html">
      <img src="images/logo%20driver.png" alt="Driver News">
    </a>
    <ul class="nav-links"><li><a href="index.html">Portal</a></li></ul>
    <div class="nav-right" id="navUserInfo"></div>
  </div>
</nav>
<div class="dash-layout">
  <aside class="dash-sidebar carbon-subtle">
    <div class="dash-profile" id="sidebarProfile"></div>
    <ul class="dash-nav">
      <li><a class="active" onclick="catNav('overview',this)"><span class="nav-icon"><i data-lucide="bar-chart-3" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Visão Geral</a></li>
      <li><a onclick="catNav('compose',this)"><span class="nav-icon"><i class="fi fi-rr-pencil"></i></span> Nova Matéria</a></li>
      <li><a onclick="catNav('articles',this)"><span class="nav-icon"><i data-lucide="newspaper" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Matérias</a></li>
      <li><a onclick="catNav('calendar',this)"><span class="nav-icon"><i data-lucide="calendar" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Calendário</a></li>
      <li><a onclick="catNav('teams',this)"><span class="nav-icon"><i data-lucide="car" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Equipes</a></li>
      <div class="dash-nav-sep"></div>
      <li><a onclick="catNav('profile',this)"><span class="nav-icon"><i data-lucide="settings" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Configurações</a></li>
      <li><a href="#" onclick="Driver.logout();window.location='index.html'"><span class="nav-icon"><i data-lucide="log-out" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Sair</a></li>
    </ul>
  </aside>
  <main class="dash-main">
    <div id="cat-overview"></div>
    <div id="cat-compose" style="display:none"></div>
    <div id="cat-articles" style="display:none"></div>
    <div id="cat-calendar" style="display:none"></div>
    <div id="cat-teams" style="display:none"></div>
    <div id="cat-profile" style="display:none"></div>
  </main>
</div>

<script src="js/core.js"></script>
<script src="js/state.js"></script>
<script>
if (!Driver.isLoggedIn()) { window.location = 'cadastro.html'; }
const USER = Driver.getCurrentUser();
if (!USER) { 
  window.location = 'cadastro.html'; 
} else if ((USER.status === 'pending_payment' || !USER.status) && !location.hostname.includes('localhost')) {
  let payLink = 'index.html?view=plans';
  if (USER.plan === 'starter') payLink = 'https://www.asaas.com/c/pcd93o8dzjozlmje';
  else if (USER.plan === 'pro') payLink = 'https://www.asaas.com/c/vz16usxyvho09ell';
  else if (USER.plan === 'equipe' || USER.plan === 'categoria') payLink = 'https://wa.me/5511976377682?text=Quero finalizar minha assinatura para ativar o painel';

  document.querySelector('.dash-sidebar').style.opacity = '0.3';
  document.querySelector('.dash-sidebar').style.pointerEvents = 'none';
  document.querySelector('.dash-main').innerHTML = `
    <div style="padding:100px 20px;text-align:center;max-width:540px;margin:0 auto">
      <div style="width:80px;height:80px;border-radius:50%;background:rgba(232,0,45,.1);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;color:var(--acc)">
        <i class="fi fi-rr-lock"></i>
      </div>
      <h1 style="font-family:var(--fd);font-size:36px;letter-spacing:1px;margin-bottom:16px;color:#fff">Assinatura Pendente</h1>
      <p style="font-size:14px;color:var(--dim);margin-bottom:32px;line-height:1.6">O seu plano <b>${Driver.getPlanName(USER.plan)}</b> ainda está aguardando pagamento ou processamento. O painel será liberado automaticamente após a confirmação.</p>
      <a href="${payLink}" target="_blank" class="btn-primary" style="font-size:16px;padding:16px">Finalizar Pagamento Agora →</a>
      <div style="margin-top:24px;font-size:11px;color:var(--muted)">Já pagou por PIX/Cartão? Atualize a página se o e-mail for o mesmo do cadastro.<br>Boletos podem levar até 2 dias úteis. <a href="index.html" style="color:var(--dim);text-decoration:underline">Sair para o Portal</a></div>
    </div>
  `;
} else {

document.getElementById('navUserInfo').innerHTML = `<span style="font-family:var(--fm);font-size:10px;color:var(--dim)">${USER.name}</span><div style="width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:11px;font-weight:700;color:#fff">${USER.avatar}</div>`;
document.getElementById('sidebarProfile').innerHTML = `<div class="dash-avatar" style="background:var(--blue);color:#fff">${USER.avatar}</div><div class="dash-user-name">${USER.name}</div><div class="dash-user-plan" style="color:var(--blue)">${Driver.getPlanName(USER.plan)}</div><div class="dash-plan-badge" style="border-color:var(--blue);color:var(--blue)">CATEGORIA</div>`;

}

const CALENDAR = [
  { round: 1, track: 'Goiânia', city: 'Goiânia/GO', date: '2026-02-22', done: true },
  { round: 2, track: 'Interlagos', city: 'São Paulo/SP', date: '2026-03-15', done: true },
  { round: 3, track: 'Curitiba', city: 'Curitiba/PR', date: '2026-03-29', done: true },
  { round: 4, track: 'Curvelo', city: 'Curvelo/MG', date: '2026-04-12', done: true },
  { round: 5, track: 'Cascavel', city: 'Cascavel/PR', date: '2026-04-26', done: true },
  { round: 6, track: 'Interlagos', city: 'São Paulo/SP', date: '2026-05-10', done: false },
  { round: 7, track: 'Goiânia', city: 'Goiânia/GO', date: '2026-05-31', done: false },
  { round: 8, track: 'Cascavel', city: 'Cascavel/PR', date: '2026-06-21', done: false },
  { round: 9, track: 'Curvelo', city: 'Curvelo/MG', date: '2026-07-12', done: false },
  { round: 10, track: 'Buenos Aires', city: 'Argentina (Especial)', date: '2026-08-02', done: false },
];

function renderOverview() {
  const stats = Driver.getUserStats(USER.id);
  const teams = Driver.getUsersByType('equipe');
  const pilots = Driver.getUsersByType('piloto');
  const usagePct = stats.limit > 0 ? ((stats.limit - stats.remaining) / stats.limit * 100) : 0;
  const nextRace = CALENDAR.find(r => !r.done);

  document.getElementById('cat-overview').innerHTML = `
    <div class="dash-header"><h1>Visão Geral</h1><div class="dash-header-actions"><button class="btn-primary" onclick="catNav('compose')"><i class="fi fi-rr-pencil"></i> Nova Matéria</button></div></div>
    <div class="stat-grid">
      <div class="stat-card accent" style="--acc:var(--gold)"><div class="stat-label">Matérias Restantes</div><div class="stat-value" style="color:var(--gold)">${stats.remaining}</div><div class="stat-detail">de ${stats.limit} · ${Driver.getPlanName(USER.plan)}</div><div class="rpm-bar" style="margin-top:10px"><div class="rpm-bar-fill" style="width:${usagePct}%"></div></div></div>
      <div class="stat-card"><div class="stat-label">Equipes</div><div class="stat-value">${teams.length}</div><div class="stat-detail">inscritas</div></div>
      <div class="stat-card"><div class="stat-label">Pilotos</div><div class="stat-value">${pilots.length}</div><div class="stat-detail">registrados</div></div>
      <div class="stat-card"><div class="stat-label">Views</div><div class="stat-value">${stats.totalViewsFormatted}</div><div class="stat-detail">acumulado</div></div>
    </div>
    ${nextRace ? `
    <div style="font-family:var(--fu);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:32px 0 12px">Próximas Etapas</div>
    <div class="card carbon-subtle" style="overflow:hidden">
      ${CALENDAR.filter(r=>!r.done).slice(0,3).map((r,i)=>`
        <div class="article-row" ${i===0?'style="border-left:3px solid var(--acc)"':''}>
          <div style="font-family:var(--fd);font-size:28px;width:40px;text-align:center;flex-shrink:0;color:${i===0?'var(--acc)':'var(--muted)'}">${r.round}</div>
          <div class="article-row-info"><div class="article-row-title">Etapa ${r.round} — ${r.track}</div><div class="article-row-meta">${Driver.formatDate(r.date)} · ${r.city}</div></div>
          ${i===0?'<div class="article-row-status"><span class="badge status-sent">Próxima</span></div>':''}
        </div>`).join('')}
    </div>` : ''}`;
}

function renderCompose() {
  const stats = Driver.getUserStats(USER.id);
  document.getElementById('cat-compose').innerHTML = `
    <div class="dash-header"><h1>Nova Matéria</h1></div>
    ${stats.remaining<=0?'<div class="card" style="padding:32px;text-align:center;border-color:var(--acc)">Limite atingido.</div>':`
    <div class="composer carbon-subtle"><div class="composer-header"><span class="composer-title">Enviar para Redação</span><span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${stats.remaining} restante(s)</span></div>
    <div class="composer-body"><div class="form-field"><label class="form-label">Título</label><input class="form-input" id="compTitle" type="text" placeholder="Título"></div>
    <div class="form-field"><label class="form-label">Contexto</label><select class="form-select" id="compType"><option>Etapa / Corrida</option><option>Calendário</option><option>Pilotos / Equipes</option><option>Patrocínio</option><option>Outro</option></select></div>
    <div class="form-field"><label class="form-label">Descrição</label><textarea class="form-textarea" id="compBrief" placeholder="Conteúdo..." style="min-height:150px"></textarea></div></div>
    <div class="composer-footer"><button class="btn-secondary" onclick="saveDraft()"><i data-lucide="save" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Rascunho</button><button class="btn-primary" onclick="submitArticle()"><i data-lucide="arrow-right" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Enviar</button></div></div>`}`;
}

function saveDraft(){const t=document.getElementById('compTitle')?.value;if(!t){showToast('Título obrigatório','err');return;}const tp=document.getElementById('compType')?.value;const b=document.getElementById('compBrief')?.value||'';Driver.addArticle({authorId:USER.id,title:t,brief:b?`[Contexto: ${tp}]\n\n${b}`:'',body:'',img:'',status:'draft',category:USER.category||''});showToast('✓ Rascunho salvo!','ok');renderOverview();renderArticles();}
function submitArticle(){const t=document.getElementById('compTitle')?.value,b=document.getElementById('compBrief')?.value,tp=document.getElementById('compType')?.value;if(!t){showToast('Título','err');return;}if(!b||b.length<50){showToast('Mín. 50 chars','err');return;}Driver.addArticle({authorId:USER.id,title:t,brief:`[Contexto: ${tp}]\n\n${b}`,body:'',img:'',status:'sent',submittedAt:new Date().toISOString().split('T')[0],category:USER.category||''});showToast('✓ Enviada!','ok');renderOverview();renderCompose();renderArticles();catNav('articles');}

function renderArticles() {
  const articles = Driver.getArticlesByAuthor(USER.id).sort((a,b)=>(b.publishedAt||b.submittedAt||'9999').localeCompare(a.publishedAt||a.submittedAt||'9999'));
  document.getElementById('cat-articles').innerHTML = `<div class="dash-header"><h1>Matérias da Categoria</h1></div><div class="articles-list">${articles.map(a=>`<div class="article-row"><div class="article-row-thumb" style="${a.img?'':'background:var(--bg3)'}">${a.img?`<img src="${a.img}" alt="">`:''}></div><div class="article-row-info"><div class="article-row-title">${a.title}</div><div class="article-row-meta">${Driver.formatDate(a.publishedAt||a.submittedAt)} · ${a.views>0?a.views.toLocaleString()+' views':''}</div></div><div class="article-row-status"><span class="badge ${Driver.getStatusCSS(a.status)}">${Driver.getStatusLabel(a.status)}</span></div></div>`).join('')}${articles.length===0?'<div style="padding:24px;text-align:center;color:var(--muted)">Nenhuma matéria.</div>':''}</div>`;
}

function renderCalendar() {
  document.getElementById('cat-calendar').innerHTML = `<div class="dash-header"><h1>Calendário 2026</h1></div><div class="card carbon-subtle" style="overflow:hidden">${CALENDAR.map(r=>`<div class="article-row" style="${r.done?'opacity:.5;':''}${!r.done&&CALENDAR.filter(x=>!x.done)[0]===r?'border-left:3px solid var(--acc)':''}"><div style="font-family:var(--fd);font-size:28px;width:40px;text-align:center;flex-shrink:0;color:${r.done?'var(--muted)':CALENDAR.filter(x=>!x.done)[0]===r?'var(--acc)':'var(--dim)'}">${r.round}</div><div class="article-row-info"><div class="article-row-title">${r.track} · ${r.city}</div><div class="article-row-meta">${Driver.formatDate(r.date)}</div></div><div class="article-row-status">${r.done?'<span class="badge status-approved">✓</span>':CALENDAR.filter(x=>!x.done)[0]===r?'<span class="badge status-review">Próxima</span>':''}</div></div>`).join('')}</div>`;
}

function renderTeams() {
  const teams = Driver.getUsersByType('equipe');
  document.getElementById('cat-teams').innerHTML = `<div class="dash-header"><h1>Equipes Inscritas</h1></div>${teams.map(t=>`<div class="user-row"><div class="user-avatar-sm" style="background:var(--gold);color:#000">${t.avatar}</div><div class="user-info"><div class="user-name">${t.name}</div><div class="user-email">${(t.pilots||[]).length} pilotos · ${Driver.getPlanName(t.plan)}</div></div><div class="user-status-col"><span class="pulse-dot"></span> ${t.status==='active'?'Ativo':'Inativo'}</div></div>`).join('')}`;
}

function renderProfile() {
  document.getElementById('cat-profile').innerHTML = `<div class="dash-header"><h1>Configurações</h1></div><div class="profile-section" style="max-width:600px"><h3>Dados da Categoria</h3><div class="form-field"><label class="form-label">Nome</label><input class="form-input" id="profName" value="${USER.name}"></div><div class="form-field"><label class="form-label">Descrição</label><textarea class="form-textarea" id="profBio">${USER.bio||''}</textarea></div><div class="form-field"><label class="form-label" style="display:flex;justify-content:space-between"><span>Categorias de Atuação</span> <span style="color:var(--dim);text-transform:none;letter-spacing:normal;font-family:var(--fb)">Vincule sua categoria principal</span></label><div id="catCategoryPicker"></div></div><button class="btn-primary" onclick="saveCatProfile()">Salvar</button></div>`;
  if (typeof renderCategoryPicker === 'function') {
    renderCategoryPicker('catCategoryPicker', USER.categories || (USER.category ? [USER.category] : []));
  }
}
function saveCatProfile() {
  const cats = typeof getSelectedCategories === 'function' ? getSelectedCategories() : [];
  Driver.updateUser(USER.id,{name:document.getElementById('profName').value,bio:document.getElementById('profBio').value,category:cats.length > 0 ? cats.join(', ') : '',categories: cats});
  showToast('✓ Salvo!','ok');
}

function catNav(n,btn){['overview','compose','articles','calendar','teams','profile'].forEach(s=>{document.getElementById('cat-'+s).style.display=s===n?'block':'none'});document.querySelectorAll('.dash-nav a').forEach(a=>a.classList.remove('active'));if(btn)btn.classList.add('active');window.scrollTo({top:0});if(n==='overview')renderOverview();if(n==='compose')renderCompose();if(n==='articles')renderArticles();if(n==='calendar')renderCalendar();if(n==='teams')renderTeams();if(n==='profile')renderProfile();}

if (USER) {
  renderOverview();
}
</script>
<script src="cookie-banner.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Painel do Piloto — Driver News</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#04040a">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="192x192" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Driver News">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
<link rel="stylesheet" href="css/core.css?v=20260417_0320">
<link rel="stylesheet" href="css/carbon.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/admin.css">
<!-- Cropper.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body class="carbon-bg">
<div class="toast-wrap" id="toastWrap"></div>

<!-- NAV -->
<nav class="carbon-subtle">
  <div class="nav-inner">
    <a class="logo" href="index.html">
      <img src="images/logo.png" alt="Driver News">
    </a>
    <ul class="nav-links"><li><a href="index.html">Portal</a></li><li><a href="piloto.html">Minha Página</a></li></ul>
    <div class="nav-right" id="navUserInfo"></div>
  </div>
</nav>

<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="dash-sidebar carbon-subtle">
    <div class="dash-profile" id="sidebarProfile"></div>
    <ul class="dash-nav">
      <li><a class="active" onclick="showSection('overview',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="bar-chart-3" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Visão Geral</a></li>
      <li><a onclick="showSection('compose',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i class="fi fi-rr-pencil"></i></span> Nova Matéria</a></li>
      <li><a onclick="showSection('articles',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="newspaper" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Minhas Matérias</a></li>
      <div class="dash-nav-sep"></div>
      <li><a onclick="showSection('profile',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="user-check" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Editar Perfil</a></li>
      <li><a style="cursor:not-allowed;opacity:.6" onclick="showToast('Disponível no lançamento','info')"><span class="nav-icon"><i data-lucide="paperclip" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Mídia Kit <span id="count_mk" style="font-family:var(--fu);font-size:9px;font-weight:700;color:var(--acc);margin-left:auto;letter-spacing:0.5px;text-transform:uppercase;background:rgba(232,0,45,0.1);padding:3px 6px;border-radius:3px"></span></a></li>
      <div class="dash-nav-sep"></div>
      <li><a style="cursor:not-allowed;opacity:.6" onclick="showToast('Disponível no lançamento','info')"><span class="nav-icon"><i data-lucide="globe" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i></span> Ver Landing Page <span id="count_lp" style="font-family:var(--fu);font-size:9px;font-weight:700;color:var(--acc);margin-left:auto;letter-spacing:0.5px;text-transform:uppercase;background:rgba(232,0,45,0.1);padding:3px 6px;border-radius:3px"></span></a></li>
      <li><a href="#" onclick="Driver.logout();window.location='index.html'"><span class="nav-icon"><i data-lucide="log-out" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Sair</a></li>
    </ul>
  </aside>

  <main class="dash-main">
    <!-- OVERVIEW -->
    <div id="sec-overview"></div>
    <!-- COMPOSE -->
    <div id="sec-compose" style="display:none"></div>
    <!-- ARTICLES -->
    <div id="sec-articles" style="display:none"></div>
    <!-- PROFILE -->
    <div id="sec-profile" style="display:none"></div>
    <!-- MEDIA KIT -->
    <div id="sec-mediakit" style="display:none"></div>
  </main>
</div>

<script src="js/core.js"></script>
<script src="js/state.js"></script>
<style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>
<script>
// ============================
// Auth guard
// ============================
if (!Driver.isLoggedIn()) { window.location = 'cadastro.html'; }
const USER = Driver.getCurrentUser();
if (!USER) { 
  window.location = 'cadastro.html'; 
} else if ((USER.is_active === false) && !location.hostname.includes('localhost')) {
  let payLink = '#';
  
  // Gera link dinâmico via API (com user_id embutido)
  if (USER.plan === 'equipe' || USER.plan === 'categoria') {
    payLink = 'https://wa.me/5511976377682?text=Quero finalizar minha assinatura para ativar o painel';
  } else {
    (async function() {
      try {
        const res = await fetch('/api/asaas/create-subscription', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: USER.id,
            user_name: USER.name,
            user_email: USER.email,
            plan: USER.plan || 'starter',
          }),
        });
        const data = await res.json();
        if (data.success && data.payment_url) {
          payLink = data.payment_url;
          const payBtn = document.querySelector('.dash-main a.btn-primary');
          if (payBtn) payBtn.href = data.payment_url;
        }
      } catch(e) { console.error('Erro ao gerar link Asaas:', e); }
    })();
  }

  document.querySelector('.dash-sidebar').style.opacity = '0.3';
  document.querySelector('.dash-sidebar').style.pointerEvents = 'none';
  document.querySelector('.dash-main').innerHTML = `
    <div style="padding:100px 20px;text-align:center;max-width:540px;margin:0 auto">
      <div style="width:80px;height:80px;border-radius:50%;background:rgba(232,0,45,.1);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;color:var(--acc)">
        <i class="fi fi-rr-lock"></i>
      </div>
      <h1 style="font-family:var(--fd);font-size:36px;letter-spacing:1px;margin-bottom:16px;color:#fff">Assinatura Pendente</h1>
      <p style="font-size:14px;color:var(--dim);margin-bottom:32px;line-height:1.6">O seu plano <b>${Driver.getPlanName(USER.plan)}</b> ainda está aguardando pagamento ou processamento. O painel será liberado automaticamente após a confirmação.</p>
      <a href="${payLink}" target="_blank" class="btn-primary" style="font-size:16px;padding:16px" id="payBtnDash">Finalizar Pagamento Agora →</a>
      <div style="margin-top:24px;font-size:11px;color:var(--muted)">Já pagou por PIX/Cartão? Atualize a página se o e-mail for o mesmo do cadastro.<br>Boletos podem levar até 2 dias úteis. <a href="index.html" style="color:var(--dim);text-decoration:underline">Sair para o Portal</a></div>
    </div>
  `;
} else {

// ============================
// Render sidebar
// ============================
// Atualiza "Minha Página" com ID do piloto logado
document.querySelector('a[href="piloto.html"]').href = 'piloto.html?id=' + USER.id;

document.getElementById('navUserInfo').innerHTML = `
  <span style="font-family:var(--fm);font-size:10px;color:var(--dim)" class="hide-mob">${USER.name}</span>
  <div id="topAvatar" style="width:32px;height:32px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:11px;font-weight:700;color:#fff;overflow:hidden" class="hide-mob">${USER.avatar_url ? '<img src="'+USER.avatar_url+'" style="width:100%;height:100%;object-fit:cover">' : USER.avatar}</div>
  <button class="btn-hamburger" style="display:flex;margin-left:16px;border-color:transparent" onclick="document.querySelector('.dash-sidebar').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
`;
document.getElementById('sidebarProfile').innerHTML = `
  <div class="dash-avatar" id="sideAvatar" style="overflow:hidden">${USER.avatar_url ? '<img src="'+USER.avatar_url+'" style="width:100%;height:100%;object-fit:cover">' : USER.avatar}</div>
  <div class="dash-user-name">${USER.name || 'Piloto'}</div>
  <div class="dash-user-plan">${Driver.getPlanName(USER.plan)} · ${USER.type ? (USER.type.charAt(0).toUpperCase() + USER.type.slice(1)) : 'Piloto'}</div>
  <div class="dash-plan-badge">${(USER.plan || '').toUpperCase()}</div>
`;
}

// ============================
// Render Overview
// ============================
function renderOverview() {
  const stats = Driver.getUserStats(USER.id);
  const articles = Driver.getArticlesByAuthor(USER.id);
  const recent = articles.filter(a => a.status !== 'draft').sort((a, b) => String(b.publishedAt || b.submittedAt || '').localeCompare(String(a.publishedAt || a.submittedAt || ''))).slice(0, 5);
  const usagePct = stats.limit > 0 ? ((stats.limit - stats.remaining) / stats.limit * 100) : 0;

  // Count by status
  const statusCounts = {};
  articles.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });

  document.getElementById('sec-overview').innerHTML = `
    <div class="dash-header">
      <h1>Visão Geral</h1>
      <div class="dash-header-actions"><button class="btn-primary" onclick="showSection('compose')"><i class="fi fi-rr-pencil"></i> Nova Matéria</button></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card accent">
        <div class="stat-label">Matérias Restantes</div>
        <div class="stat-value">${stats.remaining}</div>
        <div class="stat-detail">de ${stats.limit} matérias · ${Driver.getPlanName(USER.plan)}</div>
        <div class="rpm-bar" style="margin-top:10px"><div class="rpm-bar-fill" style="width:${usagePct}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Publicadas</div>
        <div class="stat-value">${stats.totalPublished}</div>
        <div class="stat-detail">total geral</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visualizações</div>
        <div class="stat-value">${stats.totalViewsFormatted}</div>
        <div class="stat-detail">total acumulado</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Em Andamento</div>
        <div class="stat-value">${(statusCounts.review || 0) + (statusCounts.sent || 0) + (statusCounts.approved || 0)}</div>
        <div class="stat-detail">${statusCounts.review || 0} revisão · ${statusCounts.sent || 0} enviado · ${statusCounts.approved || 0} aprovado</div>
      </div>
    </div>

    <div style="font-family:var(--fu);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:32px 0 12px">Fluxo de Publicação</div>
    <div class="status-flow">
      <div class="status-step ${statusCounts.draft ? 'active' : ''}"><span class="status-step-num">${statusCounts.draft || 0}</span><span class="status-step-label">Rascunho</span></div>
      <div class="status-step ${statusCounts.sent ? 'active' : ''}"><span class="status-step-num">${statusCounts.sent || 0}</span><span class="status-step-label">Enviado</span></div>
      <div class="status-step ${statusCounts.review ? 'active' : ''}"><span class="status-step-num">${statusCounts.review || 0}</span><span class="status-step-label">Em Revisão</span></div>
      <div class="status-step ${statusCounts.approved ? 'active' : ''}"><span class="status-step-num">${statusCounts.approved || 0}</span><span class="status-step-label">Aprovado</span></div>
      <div class="status-step ${statusCounts.published ? 'active' : ''}"><span class="status-step-num">${statusCounts.published || 0}</span><span class="status-step-label">Publicado</span></div>
    </div>

    <div style="font-family:var(--fu);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:32px 0 12px">Matérias Recentes</div>
    <div class="articles-list">
      ${recent.map(a => {
        const author = Driver.getUserById(a.authorId);
        return `<div class="article-row" onclick="showSection('articles')">
          <div class="article-row-thumb" style="${a.img ? '' : 'background:var(--bg3)'}">
            ${a.img ? `<img src="${a.img}" alt="">` : ''}
          </div>
          <div class="article-row-info">
            <div class="article-row-title">${a.title}</div>
            <div class="article-row-meta">${Driver.formatDate(a.publishedAt || a.submittedAt)} · ${a.views > 0 ? a.views.toLocaleString() + ' views' : Driver.getStatusLabel(a.status)}</div>
          </div>
          <div class="article-row-status"><span class="badge ${Driver.getStatusCSS(a.status)}">${Driver.getStatusLabel(a.status)}</span></div>
        </div>`;
      }).join('')}
      ${recent.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Nenhuma matéria ainda. Crie a primeira!</div>' : ''}
    </div>
  `;
}

// ============================
// Render Compose
// ============================
function renderCompose() {
  const stats = Driver.getUserStats(USER.id);
  const isPro = USER.plan === 'pro' || USER.plan === 'equipe' || USER.plan === 'categoria';

  document.getElementById('sec-compose').innerHTML = `
    <div class="dash-header"><h1>Nova Matéria</h1></div>
    ${stats.remaining <= 0 ? `
      <div class="card" style="padding:32px;text-align:center;border-color:var(--acc)">
        <div style="font-size:32px;margin-bottom:12px"><i class="fi fi-rr-ban" style="color:var(--acc)"></i></div>
        <div style="font-family:var(--fd);font-size:24px;margin-bottom:8px">Limite Atingido</div>
        <p style="font-size:13px;color:var(--dim);margin-bottom:16px">Você já usou todas as ${stats.limit} matéria(s) deste mês (${Driver.getPlanName(USER.plan)}). Faça upgrade para publicar mais!</p>
        <a href="index.html?view=plans" class="btn-primary">Ver Planos →</a>
      </div>
    ` : `
    <div class="composer carbon-subtle">
      <div class="composer-header">
        <span class="composer-title">Enviar para Redação</span>
        <span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${stats.remaining} matéria(s) restante(s) este mês · ${Driver.getPlanName(USER.plan)}</span>
      </div>
      <div class="composer-body">

        <div class="form-field">
          <label class="form-label">Título da Matéria</label>
          <input class="form-input" id="compTitle" type="text" placeholder="Ex: Como me preparei para a etapa de Interlagos">
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button type="button" style="display:flex;align-items:center;gap:6px;background:rgba(255,43,43,0.1);color:var(--acc);border:1px solid rgba(255,43,43,0.15);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(255,43,43,0.2)'" onmouseout="this.style.background='rgba(255,43,43,0.1)'" onclick="enhanceTitle(this)">
              <i class="fi fi-rr-magic-wand"></i> Gerar Título com IA
            </button>
          </div>
        </div>

        <div class="form-field"><label class="form-label">Contexto / Tipo de Matéria</label>
          <select class="form-select" id="compType" onchange="document.getElementById('compTypeCustom').style.display = this.value === '__custom' ? 'block' : 'none'">
            <option value="Corrida (Relatório / Resultado)">🏁 Corrida — Relatório / Resultado</option>
            <option value="Treino (Treino Livre / Classificação)">🔧 Treino — Treino Livre / Classificação</option>
            <option value="Preparação (Física / Simulador)">💪 Preparação — Física / Simulador</option>
            <option value="Bastidores (Pré-corrida / Paddock)">🎬 Bastidores — Pré-corrida / Paddock</option>
            <option value="Patrocinador (Ação de Marketing / Novo Patrocínio)">🤝 Patrocinador — Ação de Marketing</option>
            <option value="Conquista (Pódio / Título / Recorde)">🏆 Conquista — Pódio / Título / Recorde</option>
            <option value="Entrevista (Depoimento Pessoal)">🎙️ Entrevista — Depoimento Pessoal</option>
            <option value="__custom">✏️ Outro — Digitar manualmente...</option>
          </select>
          <input class="form-input" id="compTypeCustom" type="text" placeholder="Descreva o tipo de matéria..." style="display:none;margin-top:8px">
        </div>

        <div class="form-field">
          <label class="form-label">Descrição / Briefing</label>
          <textarea class="form-textarea" id="compBrief" placeholder="Descreva os detalhes do conteúdo. Inclua resultados, sentimentos, dados técnicos e destaques. Quanto mais rico o briefing, melhor a matéria profissional produzida pela redação." style="min-height:160px;margin-bottom:8px"></textarea>
          
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div class="form-hint" style="margin:0;flex:1">Mínimo 50 caracteres · A redação transformará seu briefing em matéria jornalística profissional</div>
            <div style="display:flex;gap:8px">
              <button type="button" style="display:flex;align-items:center;gap:6px;background:var(--bg2);color:var(--fg);border:1px solid var(--brd);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='var(--bg2)'" onclick="suggestBriefingQuestions(this)">
                <i class="fi fi-rr-interrogation"></i> Me ajude com perguntas
              </button>
              <button type="button" style="display:flex;align-items:center;gap:6px;background:rgba(255,43,43,0.1);color:var(--acc);border:1px solid rgba(255,43,43,0.15);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(255,43,43,0.2)'" onmouseout="this.style.background='rgba(255,43,43,0.1)'" onclick="enhanceBriefing(this)">
                <i class="fi fi-rr-magic-wand"></i> Expandir Briefing com IA
              </button>
            </div>
          </div>
        </div>

        <div class="form-field"><label class="form-label" style="display:flex;justify-content:space-between"><span>Imagens da Matéria</span><span style="font-size:10px;color:var(--dim);text-transform:none">Até 5 imagens · Opcional</span></label>
          <div id="compImgGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px"></div>
          <div id="compImgDropzone" style="border:2px dashed var(--brd);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)" onclick="document.getElementById('compImgFileInput').click()">
            <div style="font-size:28px;margin-bottom:6px">📁</div>
            <div style="font-family:var(--fu);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--acc)">ENVIAR DO DISPOSITIVO</div>
            <div style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:4px">ou cole uma URL abaixo</div>
          </div>
          <input type="file" id="compImgFileInput" accept="image/*" multiple style="display:none" onchange="handleComposeImgUpload(this)">
          <div style="display:flex;gap:6px;margin-top:8px">
            <input class="form-input" id="compImgUrl" type="url" placeholder="Cole URL da imagem e clique +" style="flex:1;font-size:12px;padding:8px 10px">
            <button type="button" class="btn-secondary" style="padding:6px 14px;font-size:11px" onclick="addComposeImgUrl()">+</button>
          </div>
          <div class="form-hint">Se não enviar, a redação selecionará imagens editoriais. A primeira imagem será a capa.</div>
        </div>

        <div class="form-field">
          <label class="form-label" style="display:flex;align-items:center;gap:8px">
            Dados do Perfil na Matéria
            ${isPro ? '<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(0,230,118,.1);color:#00e676;font-family:var(--fu);font-weight:700">PRO ATIVO</span>' : '<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(232,0,45,.1);color:var(--acc);font-family:var(--fu);font-weight:700">RECURSO PRO</span>'}
          </label>
          ${isPro ? `
            <div style="background:var(--bg1);border:1px solid var(--brd);border-radius:8px;padding:16px;display:grid;gap:16px">
              <div style="font-size:11px;color:var(--dim)">Marque os dados que deseja incluir e edite o conteúdo se necessário:</div>
              
              <div style="display:grid;gap:6px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                  <input type="checkbox" id="incSponsor" checked>
                  <span style="font-size:13px;color:#fff;font-weight:500">🤝 Patrocinadores</span>
                </label>
                <input class="form-input" id="incSponsorVal" type="text" value="${USER.sponsors || ''}" placeholder="Ex: Red Bull, Monster Energy, Pirelli..." style="font-size:12px;padding:8px 10px;margin-left:26px">
              </div>

              <div style="display:grid;gap:6px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                  <input type="checkbox" id="incSpnMsg" checked>
                  <span style="font-size:13px;color:#fff;font-weight:500">💬 Mensagem aos patrocinadores</span>
                </label>
                <input class="form-input" id="incSpnMsgVal" type="text" value="${USER.sponsor_message || ''}" placeholder="Ex: Agradeço o apoio desde o início da temporada..." style="font-size:12px;padding:8px 10px;margin-left:26px">
              </div>

              <div style="display:grid;gap:6px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                  <input type="checkbox" id="incNextRace" checked>
                  <span style="font-size:13px;color:#fff;font-weight:500">🏁 Próxima corrida</span>
                </label>
                <input class="form-input" id="incNextRaceVal" type="text" value="${USER.next_race || ''}" placeholder="Ex: 3ª Etapa Stock Car Light — Interlagos, 25/05" style="font-size:12px;padding:8px 10px;margin-left:26px">
              </div>

              <div style="display:grid;gap:6px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">

function _getFinalBrief() {
  let brief = document.getElementById('compBrief')?.value || '';
  let type = document.getElementById('compType')?.value || '';
  // Se selecionou "Outro", usar o campo customizado
  if (type === '__custom') {
    type = document.getElementById('compTypeCustom')?.value || 'Outro';
  }
  const cat = document.getElementById('compCategory')?.value || 'N/A';
  if(brief) brief = `[Contexto: ${type}]\n[Categoria Relacionada: ${cat}]\n\n` + brief;

  
  if (USER.plan === 'pro' || USER.plan === 'equipe' || USER.plan === 'categoria') {
    let appends = [];
    if (document.getElementById('incSponsor')?.checked) appends.push('Patrocinadores: ' + (document.getElementById('incSponsorVal')?.value || 'Nenhum registrado.'));
    if (document.getElementById('incSpnMsg')?.checked) appends.push('Mensagem ao Patrocinador: ' + (document.getElementById('incSpnMsgVal')?.value || 'Nenhuma registrada.'));
    if (document.getElementById('incNextRace')?.checked) appends.push('Próxima Corrida: ' + (document.getElementById('incNextRaceVal')?.value || 'Nenhuma registrada.'));
    if (document.getElementById('incGoals')?.checked) appends.push('Meta/Objetivos: ' + (document.getElementById('incGoalsVal')?.value || 'Nenhuma registrada.'));
    if (document.getElementById('incCareer')?.checked) appends.push('Histórico de Carreira: ' + (document.getElementById('incCareerVal')?.value || 'Nenhum registrado.'));
    
    if (appends.length > 0) {
      brief += '\n\n--- DADOS PRO INCLUÍDOS DURANTE O ENVIO ---\n' + appends.join('\n');
    }
  }
  return brief;
}

let composeImages = [];
let currentComposeId = null;

function handleComposeImgUpload(fileInput) {
  const files = Array.from(fileInput.files);
  if (composeImages.length + files.length > 5) {
    showToast('Máximo de 5 imagens por matéria!', 'err');
    fileInput.value = '';
    return;
  }
  
  // Como agora temos um modal de recorte, abrir vários em sequência seria doloroso.
  // Vamos processar apenas 1 por vez para recorte (ou todos em cascata sequencial)
  // Para UX otimizada, processaremos um loop assíncrono para recortes.

  const processFilesSequentially = async () => {
    for (const file of files) {
      if (file.size > 5 * 1024 * 1024) { showToast('Imagem "'+file.name+'" é muito grande (max 5MB)', 'err'); continue; }
      const dataUrl = await readFileDataUrl(file);
      const croppedUrl = await openCropper(dataUrl, NaN); // Recorte livre para matérias
      if (croppedUrl) {
        composeImages.push(croppedUrl);
        renderComposeImgGrid();
      }
    }
    fileInput.value = '';
  };
  processFilesSequentially();
}

function readFileDataUrl(file) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.readAsDataURL(file);
  });
}

function addComposeImgUrl() {
  const url = document.getElementById('compImgUrl')?.value.trim();
  if (!url) return;
  if (composeImages.length >= 5) { showToast('Máximo de 5 imagens!', 'err'); return; }
  composeImages.push(url);
  document.getElementById('compImgUrl').value = '';
  renderComposeImgGrid();
}

function removeComposeImg(idx) {
  composeImages.splice(idx, 1);
  renderComposeImgGrid();
}

function renderComposeImgGrid() {
  const grid = document.getElementById('compImgGrid');
  if (!grid) return;
  const dropzone = document.getElementById('compImgDropzone');
  if (dropzone) dropzone.style.display = composeImages.length >= 5 ? 'none' : 'block';
  grid.innerHTML = composeImages.map((src, i) => `
    <div style="position:relative;height:80px;border-radius:6px;overflow:hidden;border:1px solid var(--brd);background:var(--bg2)">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover">
      <span onclick="removeComposeImg(${i})" style="position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;line-height:1">✕</span>
      ${i === 0 ? '<span style="position:absolute;bottom:4px;left:4px;font-size:8px;font-family:var(--fu);font-weight:700;background:var(--acc);color:#fff;padding:1px 5px;border-radius:3px;letter-spacing:.5px">CAPA</span>' : ''}
    </div>
  `).join('');
}

function saveDraft() {
  const t = document.getElementById('compTitle')?.value;
  if (!t) { showToast('Informe o título', 'err'); return; }
  const c = document.getElementById('compCategory')?.value || '';
  
  const payload = {
    authorId: USER.id,
    title: t,
    brief: _getFinalBrief(),
    body: '',
    img: composeImages[0] || '',
    images: [...composeImages],
    status: 'draft',
    category: c
  };

  if (currentComposeId) {
    Driver.updateArticle(currentComposeId, payload);
    showToast('✓ Rascunho atualizado!', 'ok');
  } else {
    Driver.addArticle(payload);
    showToast('✓ Rascunho salvo!', 'ok');
  }

  currentComposeId = null;
  composeImages = [];
  renderOverview();
  renderArticles();
  showSection('articles');
}

async function enhanceBriefing(btn) {
  const briefInput = document.getElementById('compBrief');
  const text = briefInput?.value;

    showToast('Digite algumas palavras-chave primeiro.', 'err');
    return;
  }
  showToast('🤖 IA expandindo seu briefing...', 'info');
  
  const originalText = btn?.innerHTML;
  if(btn) { btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle"></span> Expandindo...'; btn.style.opacity = '0.7'; btn.style.pointerEvents = 'none'; }
  
  try {
    const contextStr = `Nome: ${USER.pilot_name || USER.name}; Categoria: ${USER.category || ''}; Patrocinadores: ${USER.sponsors || ''}`;
    const res = await fetch('/api/ai-enhance', {

        textoOriginal: text, 
        tipoCampo: 'briefing',

    if (data.enhancedText) {

      console.error('[AI Briefing] Resposta sem texto:', data);
      showToast(data.error || 'Ops! A IA não retornou texto. Tente novamente.', 'err');
    }
  } catch (e) {
    console.error('[AI Briefing] Erro:', e);
    showToast('Erro ao contatar IA: ' + e.message, 'err');
  } finally {
    if(btn) { btn.innerHTML = originalText; btn.style.opacity = '1'; btn.style.pointerEvents = 'all'; }
  }

async function submitArticle() {
  const t = document.getElementById('compTitle')?.value;
  const brief = document.getElementById('compBrief')?.value;
  if (!t) { showToast('Título obrigatório', 'err'); return; }
  if (!brief || brief.length < 50) { showToast('O briefing deve conter pelo menos 50 caracteres para gerar uma boa matéria.', 'err'); return; }
  
  const finalBrief = typeof _getFinalBrief === 'function' ? _getFinalBrief() : brief;

  // Redirect to full publishing pipeline
  sessionStorage.setItem('draft_materia', JSON.stringify({
    titulo: t,
    contexto: finalBrief,
    fotos: typeof composeImages !== 'undefined' ? composeImages : []
  }));

  window.location.href = 'redacao.html';
}

  document.querySelectorAll('#articleTabs .tab').forEach(t => t.classList.remove('active'));

  document.querySelectorAll('#articlesList .article-row').forEach(r => {
    r.style.display = status === 'all' || r.dataset.status === status ? 'flex' : 'none';
  });
}

// Recorte de imagem (WhatsApp flow) com proporção livre (NaN)
function openCropper(imgSrc, aspect) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;';
    
    overlay.innerHTML = `
      <div style="width:100%;max-width:800px;height:70vh;background:#000;border-radius:12px;overflow:hidden;position:relative;">
        <img id="cropperTarget" src="${imgSrc}" style="max-width:100%;display:block;">
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;width:100%;max-width:800px;justify-content:flex-end;">
        <button id="cropCancel" style="padding:12px 24px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-family:var(--fu);font-weight:600;font-size:16px;cursor:pointer;letter-spacing:1px">Cancelar</button>
        <button id="cropConfirm" style="padding:12px 24px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-family:var(--fu);font-weight:600;font-size:16px;cursor:pointer;letter-spacing:1px">✂️ RECORTAR</button>
      </div>
    `;
    document.body.appendChild(overlay);

    const image = document.getElementById('cropperTarget');
    const cropper = new Cropper(image, {
      aspectRatio: aspect, // livre = NaN, quadrado = 1
      viewMode: 1,
      background: false,
      dragMode: 'move',
      autoCropArea: 0.9,
    });

    document.getElementById('cropCancel').onclick = () => {
      cropper.destroy();
      overlay.remove();
      resolve(null);
    };

    document.getElementById('cropConfirm').onclick = () => {
      const canvas = cropper.getCroppedCanvas({
        maxWidth: 1200,
        maxHeight: 1200,
        fillColor: '#04040a',
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82); // Otimização alta no crop
      cropper.destroy();
      overlay.remove();
      resolve(dataUrl);
    };
  });
}

// Upload de imagem do dispositivo → joga no Cropper → atualiza preview
async function handleImgUpload(fileInput, inputId, previewId) {
  const file = fileInput.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Selecione uma imagem válida.', 'err'); return; }
  
  const dataUrlOriginal = await readFileDataUrl(file);
  
  // Decide se é 1:1, 16:9 ou Livre, mas pelo pedido o usuário quer LIVRE (WhatsApp sem seguir o padrão quadrado necessariamente)
  let aspect = NaN;
  if (inputId === 'profAvatarUrl') aspect = 1; // Avatar faz sentido ser 1:1 mesmo livre a matéria
  if (inputId === 'profCoverUrl') aspect = NaN; // Capa livre
  
  const croppedDataUrl = await openCropper(dataUrlOriginal, aspect);
  if (!croppedDataUrl) {
    fileInput.value = '';
    return;
  }

  document.getElementById(inputId).value = croppedDataUrl;
  const preview = document.getElementById(previewId);
  if (preview) {
    preview.innerHTML = `<img src="${croppedDataUrl}" style="width:100%;height:100%;object-fit:cover">`;
  }
  
  const btnRemv = document.getElementById(inputId === 'profAvatarUrl' ? 'btnClearAvatar' : inputId === 'profCoverUrl' ? 'btnClearCover' : '');
  if (btnRemv) btnRemv.style.display = 'inline-flex';

  showToast('✓ Imagem recortada! Clique em Salvar para fixar as edições.', 'ok');
  fileInput.value = '';
}

// Remover imagem: limpa input e preview
function clearImg(inputId, previewId, fallbackText) {
  document.getElementById(inputId).value = '';
  const preview = document.getElementById(previewId);
  if (preview) {
    if (fallbackText) {
      preview.innerHTML = `<span style="font-size:20px">${fallbackText}</span>`;
    } else {
      const num = inputId.replace(/\D/g, '');
      preview.innerHTML = `<span style="font-size:20px;color:var(--muted)">${num || '—'}</span>`;
    }
  }
  showToast('Imagem removida. Clique em Salvar para confirmar.', 'info');
}

  });
  if (updated) { 
    Object.assign(USER, updated);
    // Atualiza sidebar com novo nome/avatar
    const sidebarName = document.querySelector('.dash-user-name');
    if (sidebarName) sidebarName.textContent = USER.name;
    // Atualiza avatar na sidebar e no header se houver URL

      ${USER.plan === 'pro' ? '' : '<div style="font-family:var(--fu);font-size:11px;color:var(--warning);letter-spacing:1px;margin-bottom:16px"><i class="fi fi-rr-exclamation"></i> Recurso disponível no Plano Pro. <a href="index.html?view=plans" style="color:var(--acc)">Fazer upgrade</a></div>'}
      <div class="media-kit-icon"><i data-lucide="paperclip" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></div>
      <div class="media-kit-title">Mídia Kit de ${USER.name}</div>
      <div class="media-kit-desc">Material profissional com seus dados, conquistas, ${stats.totalViewsFormatted} visualizações acumuladas e informações para patrocinadores.</div>
      <button class="btn-primary" onclick="showToast('✓ Download: mídia-kit-${USER.name.toLowerCase().replace(/\\s/g,'-')}.pdf','ok')" ${USER.plan !== 'pro' ? 'disabled style="opacity:.4"' : ''}><i data-lucide="download" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Baixar Mídia Kit (PDF)</button>
      <p style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:12px">Inclui: Bio, conquistas, métricas, cotas de patrocínio</p>
    </div>
  `;
}

// ============================
// Navigation
// ============================
function showSection(name, btnEl) {
  if (name !== 'compose') { currentComposeId = null; composeImages = []; }

  ['overview','compose','articles','profile','mediakit'].forEach(s => {
    document.getElementById('sec-' + s).style.display = s === name ? 'block' : 'none';
  });
  document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  window.scrollTo({ top: 0 });
  // Re-render on navigate
  if (name === 'overview') renderOverview();
  if (name === 'compose') {
    renderCompose();
    if (currentComposeId) {
      const art = Driver.getArticlesByAuthor(USER.id).find(a => a.id === currentComposeId);
      if (art) {
        document.getElementById('compTitle').value = art.title || '';
        document.getElementById('compBrief').value = art.brief || '';
        if (art.category) document.getElementById('compCategory').value = art.category;
        composeImages = art.images && art.images.length ? [...art.images] : (art.img ? [art.img] : []);
        setTimeout(() => renderComposeImgGrid(), 50);
      }
    } else {
      setTimeout(() => renderComposeImgGrid(), 50);
    }
  }
  if (name === 'articles') renderArticles();
  if (name === 'profile') renderProfile();
  if (name === 'mediakit') renderMediaKit();
}

// Initial render
if (USER) {
  renderOverview();
  renderCompose();
  renderArticles();
  renderProfile();
  renderMediaKit();

  // Auto-abrir seção via URL (ex: ?sec=profile vindo do Editar Página)
  const urlSec = new URLSearchParams(window.location.search).get('sec');
  if (urlSec) { showSection(urlSec); }
  
  // Launch Countdown Injector
  let launchTime = localStorage.getItem('pl_launch_cd');
  if (!launchTime) { launchTime = Date.now() + (48 * 60 * 60 * 1000); localStorage.setItem('pl_launch_cd', launchTime); }
  setInterval(() => {
    let diff = launchTime - Date.now();
    if (diff <= 0) diff = 0;
    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
    const t = diff > 0 ? `Lançamento em ${h}h ${m}m ${s}s` : 'Lançado';
    const c1 = document.getElementById('count_mk');
    const c2 = document.getElementById('count_lp');
    if (c1) c1.innerText = t;
    if (c2) c2.innerText = t;
  }, 1000);
}

// Function to load the Cities in Dashboard Profile Editor
function loadProfCities(uf, preselectedCity = null) {
  const c = document.getElementById('profCity');
  if(!c) return;
  c.innerHTML = '<option value="">Carregando...</option>';
  c.disabled = true;
  if(!uf) { c.innerHTML = '<option value="">Cidade</option>'; return; }
  fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios?orderBy=nome`)
    .then(res => res.json())
    .then(cities => {
      c.innerHTML = '<option value="">Selecione a cidade</option>';
      cities.forEach(city => {
        const val = city.nome + ' - ' + uf;
        const opt = new Option(city.nome, val);
        if(preselectedCity && val.startsWith(preselectedCity)) opt.selected = true;
        c.add(opt);
      });
      c.disabled = false;
    }).catch(e => {
      c.innerHTML = '<option value="">Erro ao carregar</option>';
    });
}

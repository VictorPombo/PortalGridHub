<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Piloto — Driver News</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/carbon.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="carbon-bg">
<div class="toast-wrap" id="toastWrap"></div>

<!-- NAV -->
<nav class="carbon-subtle">
  <div class="nav-inner">
    <a class="logo" href="index.html">
      <div class="logo-badge"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg></div>
      <div class="logo-text"><span class="logo-name">Driver</span><span class="logo-tag">News</span></div>
    </a>
    <ul class="nav-links"><li><a href="index.html">Portal</a></li><li><a href="piloto.html">Minha Página</a></li></ul>
    <div class="nav-right" id="navUserInfo"></div>
  </div>
</nav>

<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="dash-sidebar carbon-subtle">
    <div class="dash-profile" id="sidebarProfile"></div>
    <ul class="dash-nav">
      <li><a class="active" onclick="showSection('overview',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="bar-chart-3" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Visão Geral</a></li>
      <li><a onclick="showSection('compose',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i class="fi fi-rr-pencil"></i></span> Nova Matéria</a></li>
      <li><a onclick="showSection('articles',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="newspaper" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Minhas Matérias</a></li>
      <div class="dash-nav-sep"></div>
      <li><a onclick="showSection('profile',this);document.querySelector('.dash-sidebar').classList.remove('open')"><span class="nav-icon"><i data-lucide="user-check" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Editar Perfil</a></li>
      <li><a style="cursor:not-allowed;opacity:.6" onclick="showToast('Disponível no lançamento','info')"><span class="nav-icon"><i data-lucide="paperclip" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Mídia Kit <span id="count_mk" style="font-family:var(--fu);font-size:9px;font-weight:700;color:var(--acc);margin-left:auto;letter-spacing:0.5px;text-transform:uppercase;background:rgba(232,0,45,0.1);padding:3px 6px;border-radius:3px"></span></a></li>
      <div class="dash-nav-sep"></div>
      <li><a style="cursor:not-allowed;opacity:.6" onclick="showToast('Disponível no lançamento','info')"><span class="nav-icon"><i data-lucide="globe" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i></span> Ver Landing Page <span id="count_lp" style="font-family:var(--fu);font-size:9px;font-weight:700;color:var(--acc);margin-left:auto;letter-spacing:0.5px;text-transform:uppercase;background:rgba(232,0,45,0.1);padding:3px 6px;border-radius:3px"></span></a></li>
      <li><a href="#" onclick="Driver.logout();window.location='cadastro.html'"><span class="nav-icon"><i data-lucide="log-out" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></span> Sair</a></li>
    </ul>
  </aside>

  <main class="dash-main">
    <!-- OVERVIEW -->
    <div id="sec-overview"></div>
    <!-- COMPOSE -->
    <div id="sec-compose" style="display:none"></div>
    <!-- ARTICLES -->
    <div id="sec-articles" style="display:none"></div>
    <!-- PROFILE -->
    <div id="sec-profile" style="display:none"></div>
    <!-- MEDIA KIT -->
    <div id="sec-mediakit" style="display:none"></div>
  </main>
</div>

<script src="js/core.js"></script>
<script src="js/state.js"></script>
<script>
// ============================
// Auth guard
// ============================
if (!Driver.isLoggedIn()) { window.location = 'cadastro.html'; }
const USER = Driver.getCurrentUser();
if (!USER) { 
  window.location = 'cadastro.html'; 
} else if (USER.status === 'pending_payment' || !USER.status) {
  let payLink = 'index.html?view=plans';
  if (USER.plan === 'starter') payLink = 'https://www.asaas.com/c/pcd93o8dzjozlmje';
  else if (USER.plan === 'pro') payLink = 'https://www.asaas.com/c/vz16usxyvho09ell';
  else if (USER.plan === 'equipe' || USER.plan === 'categoria') payLink = 'https://wa.me/5511976377682?text=Quero finalizar minha assinatura para ativar o painel';

  document.querySelector('.dash-sidebar').style.opacity = '0.3';
  document.querySelector('.dash-sidebar').style.pointerEvents = 'none';
  document.querySelector('.dash-main').innerHTML = `
    <div style="padding:100px 20px;text-align:center;max-width:540px;margin:0 auto">
      <div style="width:80px;height:80px;border-radius:50%;background:rgba(232,0,45,.1);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;color:var(--acc)">
        <i class="fi fi-rr-lock"></i>
      </div>
      <h1 style="font-family:var(--fd);font-size:36px;letter-spacing:1px;margin-bottom:16px;color:#fff">Assinatura Pendente</h1>
      <p style="font-size:14px;color:var(--dim);margin-bottom:32px;line-height:1.6">O seu plano <b>${Driver.getPlanName(USER.plan)}</b> ainda está aguardando pagamento ou processamento. O painel será liberado automaticamente após a confirmação.</p>
      <a href="${payLink}" target="_blank" class="btn-primary" style="font-size:16px;padding:16px">Finalizar Pagamento Agora →</a>
      <div style="margin-top:24px;font-size:11px;color:var(--muted)">Já pagou por PIX/Cartão? Atualize a página se o e-mail for o mesmo do cadastro.<br>Boletos podem levar até 2 dias úteis. <a href="index.html" style="color:var(--dim);text-decoration:underline">Sair para o Portal</a></div>
    </div>
  `;
} else {

// ============================
// Render sidebar
// ============================
document.getElementById('navUserInfo').innerHTML = `
  <span style="font-family:var(--fm);font-size:10px;color:var(--dim)" class="hide-mob">${USER.name}</span>
  <div style="width:32px;height:32px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:11px;font-weight:700;color:#fff" class="hide-mob">${USER.avatar}</div>
  <button class="btn-hamburger" style="display:flex;margin-left:16px;border-color:transparent" onclick="document.querySelector('.dash-sidebar').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
`;
document.getElementById('sidebarProfile').innerHTML = `
  <div class="dash-avatar">${USER.avatar}</div>
  <div class="dash-user-name">${USER.name || 'Piloto'}</div>
  <div class="dash-user-plan">${Driver.getPlanName(USER.plan)} · ${USER.type.charAt(0).toUpperCase() + USER.type.slice(1)}</div>
  <div class="dash-plan-badge">${(USER.plan || '').toUpperCase()}</div>
`;
}

// ============================
// Render Overview
// ============================
function renderOverview() {
  const stats = Driver.getUserStats(USER.id);
  const articles = Driver.getArticlesByAuthor(USER.id);
  const recent = articles.filter(a => a.status !== 'draft').sort((a, b) => (b.publishedAt || b.submittedAt || '').localeCompare(a.publishedAt || a.submittedAt || '')).slice(0, 5);
  const usagePct = stats.limit > 0 ? ((stats.limit - stats.remaining) / stats.limit * 100) : 0;

  // Count by status
  const statusCounts = {};
  articles.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });

  document.getElementById('sec-overview').innerHTML = `
    <div class="dash-header">
      <h1>Visão Geral</h1>
      <div class="dash-header-actions"><button class="btn-primary" onclick="showSection('compose')"><i class="fi fi-rr-pencil"></i> Nova Matéria</button></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card accent">
        <div class="stat-label">Matérias Restantes</div>
        <div class="stat-value">${stats.remaining}</div>
        <div class="stat-detail">de ${stats.limit} matérias · ${Driver.getPlanName(USER.plan)}</div>
        <div class="rpm-bar" style="margin-top:10px"><div class="rpm-bar-fill" style="width:${usagePct}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Publicadas</div>
        <div class="stat-value">${stats.totalPublished}</div>
        <div class="stat-detail">total geral</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visualizações</div>
        <div class="stat-value">${stats.totalViewsFormatted}</div>
        <div class="stat-detail">total acumulado</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Em Andamento</div>
        <div class="stat-value">${(statusCounts.review || 0) + (statusCounts.sent || 0) + (statusCounts.approved || 0)}</div>
        <div class="stat-detail">${statusCounts.review || 0} revisão · ${statusCounts.sent || 0} enviado · ${statusCounts.approved || 0} aprovado</div>
      </div>
    </div>

    <div style="font-family:var(--fu);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:32px 0 12px">Fluxo de Publicação</div>
    <div class="status-flow">
      <div class="status-step ${statusCounts.draft ? 'active' : ''}"><span class="status-step-num">${statusCounts.draft || 0}</span><span class="status-step-label">Rascunho</span></div>
      <div class="status-step ${statusCounts.sent ? 'active' : ''}"><span class="status-step-num">${statusCounts.sent || 0}</span><span class="status-step-label">Enviado</span></div>
      <div class="status-step ${statusCounts.review ? 'active' : ''}"><span class="status-step-num">${statusCounts.review || 0}</span><span class="status-step-label">Em Revisão</span></div>
      <div class="status-step ${statusCounts.approved ? 'active' : ''}"><span class="status-step-num">${statusCounts.approved || 0}</span><span class="status-step-label">Aprovado</span></div>
      <div class="status-step ${statusCounts.published ? 'active' : ''}"><span class="status-step-num">${statusCounts.published || 0}</span><span class="status-step-label">Publicado</span></div>
    </div>

    <div style="font-family:var(--fu);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:32px 0 12px">Matérias Recentes</div>
    <div class="articles-list">
      ${recent.map(a => {
        const author = Driver.getUserById(a.authorId);
        return `<div class="article-row" onclick="showSection('articles')">
          <div class="article-row-thumb" style="${a.img ? '' : 'background:var(--bg3)'}">
            ${a.img ? `<img src="${a.img}" alt="">` : ''}
          </div>
          <div class="article-row-info">
            <div class="article-row-title">${a.title}</div>
            <div class="article-row-meta">${Driver.formatDate(a.publishedAt || a.submittedAt)} · ${a.views > 0 ? a.views.toLocaleString() + ' views' : Driver.getStatusLabel(a.status)}</div>
          </div>
          <div class="article-row-status"><span class="badge ${Driver.getStatusCSS(a.status)}">${Driver.getStatusLabel(a.status)}</span></div>
        </div>`;
      }).join('')}
      ${recent.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Nenhuma matéria ainda. Crie a primeira!</div>' : ''}
    </div>
  `;
}

// ============================
// Render Compose
// ============================
function renderCompose() {
  const stats = Driver.getUserStats(USER.id);
  const isPro = USER.plan === 'pro' || USER.plan === 'equipe' || USER.plan === 'categoria';

  document.getElementById('sec-compose').innerHTML = `
    <div class="dash-header"><h1>Nova Matéria</h1></div>
    ${stats.remaining <= 0 ? `
      <div class="card" style="padding:32px;text-align:center;border-color:var(--acc)">
        <div style="font-size:32px;margin-bottom:12px"><i data-lucide="ban" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;color:#e8002d"></i></div>
        <div style="font-family:var(--fd);font-size:24px;margin-bottom:8px">Limite Atingido</div>
        <p style="font-size:13px;color:var(--dim);margin-bottom:16px">Você já usou todas as ${stats.limit} matéria(s) deste mês (${Driver.getPlanName(USER.plan)}). Faça upgrade para publicar mais!</p>
        <a href="index.html?view=plans" class="btn-primary">Ver Planos →</a>
      </div>
    ` : `
    <div class="composer carbon-subtle">
      <div class="composer-header">
        <span class="composer-title">Enviar para Redação</span>
        <span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${stats.remaining} matéria(s) restante(s) este mês</span>
      </div>
      <div class="composer-body">
        <div class="form-field"><label class="form-label">Título da Matéria</label>
          <input class="form-input" id="compTitle" type="text" placeholder="Ex: Como me preparei para a etapa de Interlagos">
        </div>
        <div class="form-field"><label class="form-label">Contexto / Tipo de Matéria</label>
          <select class="form-select" id="compType">
            <option>Corrida (Relatório / Resultado)</option>
            <option>Treino (Treino Livre / Classificação)</option>
            <option>Preparação (Física / Simulador)</option>
            <option>Patrocinador (Ação de Marketing / Novo Patrocínio)</option>
            <option>Outro (Anúncio Geral / Novidade)</option>
          </select>
        </div>
        <div class="form-field"><label class="form-label">Descrição / Briefing</label><textarea class="form-textarea" id="compBrief" placeholder="Descreva o conteúdo. Nossa redação vai transformar em matéria jornalística profissional." style="min-height:150px"></textarea><div class="form-hint">Mínimo 50 caracteres · Quanto mais detalhes, melhor o resultado</div></div>
        
        <div class="form-field">
          <label class="form-label">Incorporação de Dados (Plano Pro)</label>
          ${isPro ? `
            <div class="pro-incorporate-box">
              <label class="check-wrap"><input type="checkbox" id="incSponsor" checked> <span>Citar meus patrocinadores nesta matéria</span></label>
              <label class="check-wrap"><input type="checkbox" id="incSpnMsg" checked> <span>Incluir minha mensagem aos patrocinadores</span></label>
              <label class="check-wrap"><input type="checkbox" id="incNextRace" checked> <span>Mencionar minha próxima corrida</span></label>
              <label class="check-wrap"><input type="checkbox" id="incGoals" checked> <span>Contextualizar minhas Metas de Carreira</span></label>
              <div class="form-hint" style="margin-top:8px">A redação usará os dados do seu Perfil para enriquecer o artigo automaticamente.</div>
            </div>
          ` : `
            <div class="pro-locked-box" style="padding:16px;border:1px dashed var(--bg3);border-radius:4px;background:var(--bg2);opacity:0.7">
              <div style="font-family:var(--fu);font-weight:700;font-size:12px;color:var(--acc);margin-bottom:8px">🔒 RECURSO PRO BLOQUEADO</div>
              <p style="font-size:12px;color:var(--dim);margin:0 0 12px">Pilotos Pro podem injetar seus patrocinadores, histórico de carreira e próximas corridas automaticamente no briefing da matéria.</p>
              <a href="index.html?view=plans" class="btn-secondary" style="font-size:10px;padding:4px 8px">Fazer Upgrade</a>
            </div>
          `}
        </div>

        <div class="form-field"><label class="form-label" style="display:flex;justify-content:space-between"><span>Categoria Associada</span><span style="font-size:10px;color:var(--dim);text-transform:none">Opcional</span></label>
          <select class="form-select" id="compCategory">
            ${(USER.categories?.length ? USER.categories : (USER.category ? [USER.category] : [])).map(c => `<option value="${c}">${c.includes(' - ') ? c.split(' - ')[1] : c}</option>`).join('')}
            <option value="Notícia Geral">Geral / Múltiplas</option>
          </select>
        </div>
      </div>
      <div class="composer-footer">
        <button class="btn-secondary" onclick="saveDraft()"><i data-lucide="save" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Salvar Rascunho</button>
        <button class="btn-primary" onclick="submitArticle()"><i data-lucide="arrow-right" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Enviar para Redação</button>
      </div>
    </div>
    `}
  `;
}

function _getFinalBrief() {
  let brief = document.getElementById('compBrief')?.value || '';
  const type = document.getElementById('compType')?.value || '';
  const cat = document.getElementById('compCategory')?.value || 'N/A';
  if(brief) brief = `[Contexto: ${type}]\n[Categoria Relacionada: ${cat}]\n\n` + brief;

  
  if (USER.plan === 'pro' || USER.plan === 'equipe' || USER.plan === 'categoria') {
    let appends = [];
    if (document.getElementById('incSponsor')?.checked) appends.push('Patrocinadores: ' + (USER.sponsors || 'Nenhum registrado.'));
    if (document.getElementById('incSpnMsg')?.checked) appends.push('Mensagem ao Patrocinador: ' + (USER.sponsor_message || 'Nenhuma registrada.'));
    if (document.getElementById('incNextRace')?.checked) appends.push('Próxima Corrida: ' + (USER.next_race || 'Nenhuma registrada.'));
    if (document.getElementById('incGoals')?.checked) appends.push('Meta/Objetivos: ' + (USER.goals || 'Nenhuma registrada.'));
    
    if (appends.length > 0) {
      brief += '\n\n--- DADOS PRO INCLUÍDOS DURANTE O ENVIO ---\n' + appends.join('\n');
    }
  }
  return brief;
}

function saveDraft() {
  const t = document.getElementById('compTitle')?.value;
  if (!t) { showToast('Informe o título', 'err'); return; }
  const c = document.getElementById('compCategory')?.value || '';
  Driver.addArticle({
    authorId: USER.id,
    title: t,
    brief: _getFinalBrief(),
    body: '',
    img: '',
    status: 'draft',
    category: c
  });
  showToast('✓ Rascunho salvo!', 'ok');
  renderOverview();
  renderArticles();
}

function submitArticle() {
  const t = document.getElementById('compTitle')?.value;
  const brief = document.getElementById('compBrief')?.value; // check original min length
  if (!t) { showToast('Título obrigatório', 'err'); return; }
  if (!brief || brief.length < 50) { showToast('O briefing deve conter pelo menos 50 caracteres para gerar uma boa matéria.', 'err'); return; }
  const c = document.getElementById('compCategory')?.value || '';

  Driver.addArticle({
    authorId: USER.id,
    title: t,
    brief: _getFinalBrief(),
    body: '',
    img: '',
    status: 'sent',
    submittedAt: new Date().toISOString().split('T')[0],
    category: c
  });
  showToast('✓ Matéria enviada para a redação! Acompanhe o status em "Minhas Matérias".','ok');
  renderOverview(); renderCompose(); renderArticles();
  showSection('articles');
}

// ============================
// Render Articles
// ============================
function renderArticles() {
  const articles = Driver.getArticlesByAuthor(USER.id).sort((a, b) => (b.publishedAt || b.submittedAt || '9999').localeCompare(a.publishedAt || a.submittedAt || '9999'));
  const filterBtns = ['all','published','review','sent','draft'];
  document.getElementById('sec-articles').innerHTML = `
    <div class="dash-header"><h1>Minhas Matérias</h1></div>
    <div class="tabs" id="articleTabs">
      ${filterBtns.map((f, i) => `<button class="tab ${i === 0 ? 'active' : ''}" onclick="filterArticles('${f}',this)">${f === 'all' ? 'Todas (' + articles.length + ')' : Driver.getStatusLabel(f) + ' (' + articles.filter(a => a.status === f).length + ')'}</button>`).join('')}
    </div>
    <div class="articles-list" id="articlesList">
      ${articles.map(a => `
        <div class="article-row" data-status="${a.status}">
          <div class="article-row-thumb" style="${a.img ? '' : 'background:var(--bg3)'}">
            ${a.img ? `<img src="${a.img}" alt="">` : ''}
          </div>
          <div class="article-row-info">
            <div class="article-row-title">${a.title}</div>
            <div class="article-row-meta">${Driver.formatDate(a.publishedAt || a.submittedAt)} · ${a.views > 0 ? a.views.toLocaleString() + ' views' : a.brief ? a.brief.substring(0, 60) + '...' : ''}</div>
          </div>
          <div class="article-row-status"><span class="badge ${Driver.getStatusCSS(a.status)}">${Driver.getStatusLabel(a.status)}</span></div>
          <div class="article-row-actions">
            ${a.status === 'draft' ? `<button class="btn-secondary" style="padding:6px 12px;font-size:10px" onclick="event.stopPropagation();editDraft('${a.id}')"><i data-lucide="pencil" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Editar</button>` : ''}
            ${a.status === 'approved' ? `<button class="btn-success" style="padding:6px 12px;font-size:10px" onclick="event.stopPropagation();approvePublish('${a.id}')"><i data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Aprovar</button>` : ''}
            ${['published','review','approved'].includes(a.status) ? `<button class="btn-secondary" style="padding:6px 12px;font-size:10px" onclick="event.stopPropagation();previewArticle('${a.id}')"><i data-lucide="eye" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Ver</button>` : ''}
          </div>
        </div>
      `).join('')}
      ${articles.length === 0 ? '<div style="padding:24px;text-align:center;color:var(--muted)">Nenhuma matéria ainda.</div>' : ''}
    </div>
  `;
}

function filterArticles(status, btn) {
  document.querySelectorAll('#articleTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#articlesList .article-row').forEach(r => {
    r.style.display = status === 'all' || r.dataset.status === status ? 'flex' : 'none';
  });
}

function editDraft(id) { showToast('Abrindo rascunho para edição...'); showSection('compose'); }
function approvePublish(id) {
  Driver.changeArticleStatus(id, 'published');
  showToast('✓ Matéria publicada!','ok');
  renderOverview(); renderArticles();
}
function previewArticle(id) {
  const a = Driver.getArticleById(id);
  if (!a) return;
  showToast(a.title + ' — ' + Driver.getStatusLabel(a.status));
}

// ============================
// Render Profile
// ============================
function renderProfile() {
  document.getElementById('sec-profile').innerHTML = `
    <div class="dash-header"><h1>Editar Perfil</h1></div>
    <div class="profile-grid">
      <div class="profile-section">
        <h3>Foto Principal</h3>
        <label class="avatar-upload" onclick="showToast('Upload de imagem da galeria (em breve)', 'info')">
          ${USER.avatar_url ? `<img src="${USER.avatar_url}" alt="">` : `<i data-lucide="camera" style="width:24px;height:24px;color:var(--dim)"></i><div style="position:absolute;font-family:var(--fu);font-size:11px;font-weight:700;color:#fff">${USER.avatar}</div>`}
        </label>
        <p style="font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:24px">Sua foto aparecerá nas matérias e na Landing Page.</p>
        
        <h3>Dados Básicos</h3>
        <div class="form-field"><label class="form-label">Nome de Piloto</label><input class="form-input" id="profPilotName" type="text" value="${USER.pilot_name || USER.name || ''}"></div>
        <div class="form-field"><label class="form-label">E-mail</label><input class="form-input" type="email" value="${USER.email}" disabled style="opacity:.5"></div>
        <div class="form-field"><label class="form-label">Data de Nascimento</label><input class="form-input" id="profDob" type="text" placeholder="DD/MM/AAAA" value="${USER.dob || ''}"></div>
        <div class="form-field"><label class="form-label">Cidade / Estado</label><input class="form-input" id="profCity" type="text" value="${USER.city || ''}"></div>
        
        <div style="margin-top:24px;border-top:1px solid var(--bg3);padding-top:16px;"></div>
        <h3>Carreira e Competição</h3>
        <div class="form-field"><label class="form-label" style="display:flex;justify-content:space-between"><span>Categorias de Atuação</span> <span style="color:var(--dim);text-transform:none;letter-spacing:normal;font-family:var(--fb)">Você pode selecionar várias</span></label>
          <div id="profCategoryPicker"></div>
        </div>
        <div class="form-field"><label class="form-label">Equipe Atual</label><input class="form-input" id="profTeam" type="text" value="${USER.team || ''}"></div>
        <div class="form-field"><label class="form-label">Número do Carro</label><input class="form-input" id="profNumber" type="text" value="${USER.number || ''}"></div>
        <div class="form-field"><label class="form-label">Última Corrida</label><input class="form-input" id="profLastRace" type="text" placeholder="Resultados P5 Interlagos..." value="${USER.last_race || ''}"></div>
        <div class="form-field"><label class="form-label">Próxima Corrida</label><input class="form-input" id="profNextRace" type="text" placeholder="Etapa Velocitta..." value="${USER.next_race || ''}"></div>
      </div>
      
      <div class="profile-section">
        <h3>Aprofundamento (Pro)</h3>
        <div class="form-field"><label class="form-label">Histórico de Carreira</label><textarea class="form-textarea" id="profCareer" style="min-height:80px" placeholder="Resumo de onde correu">${USER.career || ''}</textarea></div>
        <div class="form-field"><label class="form-label">Metas de Carreira / Objetivos</label><textarea class="form-textarea" id="profGoals" style="min-height:80px" placeholder="Qual o próximo alvo?">${USER.goals || ''}</textarea></div>
        
        <div style="margin-top:24px;border-top:1px solid var(--bg3);padding-top:16px;"></div>
        <h3>Mídia e Patrocínio</h3>
        <div class="form-field"><label class="form-label">Bio (Landing Page)</label><textarea class="form-textarea" id="profBio" style="min-height:80px">${USER.bio || ''}</textarea></div>
        <div class="form-field"><label class="form-label">Suas Marcas/Patrocinadores</label><input class="form-input" id="profSponsors" type="text" placeholder="Brand A, Brand B..." value="${USER.sponsors || ''}"></div>
        <div class="form-field"><label class="form-label">Mensagem Institucional (Redação)</label><textarea class="form-textarea" id="profSponsorMsg" style="min-height:60px" placeholder="Qual a mensagem padrão para colocar nas matérias?">${USER.sponsor_message || ''}</textarea></div>
        <div class="form-field"><label class="form-label">Instagram</label><input class="form-input" id="profIG" type="text" value="${USER.instagram || ''}"></div>
        <div class="form-field"><label class="form-label">WhatsApp Contato</label><input class="form-input" id="profWhatsapp" type="text" value="${USER.whatsapp || ''}"></div>
        <button class="btn-primary" onclick="saveProfile()" style="margin-top:24px;width:100%;font-size:16px;padding:12px">💾 SALVAR TODOS OS DADOS</button>
      </div>
    </div>
    </div>
  `;
  
  if (typeof renderCategoryPicker === 'function') {
    renderCategoryPicker('profCategoryPicker', USER.categories || (USER.category ? [USER.category] : []));
  }
}

async function saveProfile() {
  const cats = typeof getSelectedCategories === 'function' ? getSelectedCategories() : [];
  const updated = await Driver.updateUser(USER.id, {
    pilot_name: document.getElementById('profPilotName').value,
    dob: document.getElementById('profDob').value,
    city: document.getElementById('profCity').value,
    category: cats.length > 0 ? cats.join(', ') : '',
    categories: cats,
    team: document.getElementById('profTeam').value,
    number: document.getElementById('profNumber').value,
    last_race: document.getElementById('profLastRace').value,
    next_race: document.getElementById('profNextRace').value,
    career: document.getElementById('profCareer').value,
    goals: document.getElementById('profGoals').value,
    bio: document.getElementById('profBio').value,
    sponsors: document.getElementById('profSponsors').value,
    sponsor_message: document.getElementById('profSponsorMsg').value,
    instagram: document.getElementById('profIG').value,
    whatsapp: document.getElementById('profWhatsapp').value,
  });
  if (updated) { 
    Object.assign(USER, updated); 
    showToast('✓ Perfil atualizado e salvo!','ok'); 
  }
}

// ============================
// Render Media Kit
// ============================
function renderMediaKit() {
  const stats = Driver.getUserStats(USER.id);
  document.getElementById('sec-mediakit').innerHTML = `
    <div class="dash-header"><h1>Mídia Kit</h1></div>
    <div class="media-kit-card carbon-subtle">
      ${USER.plan === 'pro' ? '' : '<div style="font-family:var(--fu);font-size:11px;color:var(--warning);letter-spacing:1px;margin-bottom:16px"><i class="fi fi-rr-exclamation"></i> Recurso disponível no Plano Pro. <a href="index.html?view=plans" style="color:var(--acc)">Fazer upgrade</a></div>'}
      <div class="media-kit-icon"><i data-lucide="paperclip" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom"></i></div>
      <div class="media-kit-title">Mídia Kit de ${USER.name}</div>
      <div class="media-kit-desc">Material profissional com seus dados, conquistas, ${stats.totalViewsFormatted} visualizações acumuladas e informações para patrocinadores.</div>
      <button class="btn-primary" onclick="showToast('✓ Download: mídia-kit-${USER.name.toLowerCase().replace(/\\s/g,'-')}.pdf','ok')" ${USER.plan !== 'pro' ? 'disabled style="opacity:.4"' : ''}><i data-lucide="download" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom"></i> Baixar Mídia Kit (PDF)</button>
      <p style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:12px">Inclui: Bio, conquistas, métricas, cotas de patrocínio</p>
    </div>
  `;
}

// ============================
// Navigation
// ============================
function showSection(name, btnEl) {
  ['overview','compose','articles','profile','mediakit'].forEach(s => {
    document.getElementById('sec-' + s).style.display = s === name ? 'block' : 'none';
  });
  document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  window.scrollTo({ top: 0 });
  // Re-render on navigate
  if (name === 'overview') renderOverview();
  if (name === 'compose') renderCompose();
  if (name === 'articles') renderArticles();
  if (name === 'profile') renderProfile();
  if (name === 'mediakit') renderMediaKit();
}

// Initial render
if (USER) {
  renderOverview();
  renderCompose();
  renderArticles();
  renderProfile();
  renderMediaKit();
  
  // Launch Countdown Injector
  let launchTime = localStorage.getItem('pl_launch_cd');
  if (!launchTime) { launchTime = Date.now() + (48 * 60 * 60 * 1000); localStorage.setItem('pl_launch_cd', launchTime); }
  setInterval(() => {
    let diff = launchTime - Date.now();
    if (diff <= 0) diff = 0;
    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
    const t = diff > 0 ? `Lançamento em ${h}h ${m}m ${s}s` : 'Lançado';
    const c1 = document.getElementById('count_mk');
    const c2 = document.getElementById('count_lp');
    if (c1) c1.innerText = t;
    if (c2) c2.innerText = t;
  }, 1000);
}
</script>
</body>
</html>

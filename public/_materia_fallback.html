<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Driver News — Matéria</title>
<meta name="description" content="Leia esta matéria exclusiva na Driver News.">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DRIVER NEWS — MATÉRIA TEMPLATE v2
   Self-contained. Zero external CSS deps.
   ══════════════════════════════════════ */

/* — RESET & BASE — */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:#0a0a0a;
  color:#e0e0e0;
  font-family:'Inter','Helvetica Neue',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* — CSS VARIABLES — */
:root{
  --acc:#e10600;
  --fg:#ffffff;
  --dim:#999;
  --muted:#666;
  --bg0:#0a0a0a;
  --bg1:#111113;
  --bg2:#18181b;
  --brd:rgba(255,255,255,0.06);
  --fu:'Bebas Neue','Barlow Condensed',Impact,sans-serif;
  --fi:'Inter','Helvetica Neue',sans-serif;
  --max-w:680px;
  --hero-max:800px;
}

/* — STICKY HEADER — */
.dn-header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:2px solid var(--acc);
  height:56px;
  display:flex;align-items:center;
}
.dn-header-inner{
  max-width:1200px;width:100%;margin:0 auto;
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.dn-logo{
  display:flex;align-items:center;gap:8px;
  text-decoration:none;
}
.dn-logo-icon{
  width:32px;height:32px;
  background:var(--acc);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  transform:skewX(-12deg);
}
.dn-logo-icon svg{width:18px;height:18px;fill:#fff;transform:skewX(12deg)}
.dn-logo-text{display:flex;flex-direction:column;line-height:1}
.dn-logo-driver{font-family:var(--fu);font-size:22px;letter-spacing:1px;color:#fff}
.dn-logo-news{font-family:var(--fu);font-size:12px;color:var(--acc);margin-top:-2px}
.dn-back{
  font-family:var(--fi);font-size:12px;font-weight:500;
  color:var(--dim);letter-spacing:0.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
  transition:color 0.2s;
}
.dn-back:hover{color:var(--acc)}
.dn-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* — LOADER — */
@keyframes dn-spin{to{transform:rotate(360deg)}}
.dn-loader{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:120px 20px;gap:16px;
}
.dn-loader-ring{
  width:40px;height:40px;
  border:3px solid rgba(255,255,255,0.06);
  border-top-color:var(--acc);
  border-radius:50%;
  animation:dn-spin 0.7s linear infinite;
}

/* — HERO SECTION — */
.m-hero{
  padding:48px 20px 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.m-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:300px;
  background:radial-gradient(ellipse at 50% 0%, rgba(225,6,0,0.06) 0%, transparent 70%);
  pointer-events:none;
}
.m-hero-inner{
  max-width:var(--hero-max);margin:0 auto;position:relative;z-index:2;
}

/* — CATEGORY BADGE — */
.m-cat{
  display:inline-block;
  background:var(--acc);color:#fff;
  font-family:var(--fu);font-size:12px;
  padding:5px 14px;border-radius:4px;
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:20px;
}

/* — RACING SEPARATOR — */
.m-race-line{
  width:40px;height:2px;
  background:var(--acc);
  margin:0 auto 20px;
}

/* — ARTICLE TITLE — */
.m-title{
  font-family:var(--fu);
  font-size:clamp(2rem, 5vw, 3.2rem);
  font-weight:800;line-height:1.05;
  color:var(--fg);
  text-transform:uppercase;
  letter-spacing:-0.5px;
  margin-bottom:20px;
  text-wrap:balance;
}

/* — META (author + date) — */
.m-meta{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding-bottom:40px;
  flex-wrap:wrap;
}
.m-author-link{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  transition:opacity 0.2s;
}
.m-author-link:hover{opacity:0.75}
.m-author-img{
  width:40px;height:40px;border-radius:50%;
  object-fit:cover;border:2px solid rgba(255,255,255,0.08);
  background:var(--bg2);
}
.m-author-name{
  font-family:var(--fi);font-size:14px;font-weight:600;color:#fff;
}
.m-meta-sep{color:var(--muted);font-size:13px}
.m-meta-date{font-size:13px;color:var(--dim);font-weight:300}
.m-meta-views{font-size:13px;color:var(--muted);font-weight:300}

/* — HERO IMAGE — */
.m-hero-img-wrap{
  max-width:var(--hero-max);margin:0 auto;
  position:relative;border-radius:12px;overflow:hidden;
}
.m-hero-img-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(to top, var(--bg0), transparent);
  pointer-events:none;
}
.m-content-img{
  width:100%;max-height:480px;object-fit:cover;
  display:block;
}

/* — ARTICLE BODY — */
.m-content{
  max-width:var(--max-w);
  margin:48px auto 0;
  padding:0 20px;
}
.m-body{
  font-family:var(--fi);
  font-size:1.1rem;
  line-height:1.8;
  color:#d8d8d8;
}
.m-body p{margin-bottom:1.6em}
.m-body p:first-of-type::first-letter{
  font-family:var(--fu);
  font-size:3.2em;
  float:left;
  line-height:0.8;
  margin:6px 10px 0 -2px;
  color:var(--acc);
  font-weight:700;
}
.m-body img{
  max-width:100%;border-radius:8px;height:auto !important;
  margin:24px 0;
}
.m-body strong{color:var(--fg);font-weight:600}
.m-body em{color:var(--dim)}
.m-body a{color:var(--acc);text-decoration:underline;text-underline-offset:3px}
.m-body a:hover{opacity:0.8}
.m-body h1,.m-body h2,.m-body h3{
  font-family:var(--fu);
  color:var(--fg);
  text-transform:uppercase;
  margin:2.5em 0 0.8em;
  line-height:1.15;
  letter-spacing:0.5px;
}
.m-body h2{font-size:1.6rem}
.m-body h3{font-size:1.3rem}
.m-body blockquote{
  border-left:3px solid var(--acc);
  padding:20px 24px;
  margin:2em 0;
  background:rgba(225,6,0,0.03);
  border-radius:0 8px 8px 0;
  font-style:italic;
  font-size:1.05rem;
  color:#ccc;
  position:relative;
}
.m-body blockquote::before{
  content:'\201C';position:absolute;top:-6px;left:10px;
  font-family:Georgia,serif;font-size:48px;
  color:var(--acc);opacity:0.15;
}
.m-body ul,.m-body ol{margin:1em 0 1.5em 1.5em;color:#d0d0d0}
.m-body li{margin-bottom:0.5em}
.m-body hr{
  border:none;height:1px;
  background:linear-gradient(to right, transparent, var(--acc), transparent);
  margin:2.5em 0;opacity:0.3;
}

/* Quill alignment classes */
.ql-align-center{text-align:center !important}
.ql-align-right{text-align:right !important}
.ql-align-justify{text-align:justify !important}
.ql-align-center img{display:block;margin:0 auto !important}
.ql-align-right img{display:block;margin-left:auto !important;margin-right:0 !important}
img[style*="margin: auto"]{display:block !important;margin:0 auto !important}
img[style*="float: right"]{float:right !important;margin-left:20px !important}
img[style*="float: left"]{float:left !important;margin-right:20px !important}

/* — INSTAGRAM CTA — */
.m-ig-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--acc);color:#fff;
  font-family:var(--fi);font-size:12px;font-weight:600;
  padding:8px 18px;border-radius:6px;
  text-transform:uppercase;letter-spacing:0.5px;
  transition:transform 0.2s, box-shadow 0.2s;
  transform:skewX(-8deg);
  box-shadow:0 4px 12px rgba(225,6,0,0.25);
}
.m-ig-btn:hover{transform:skewX(-8deg) translateY(-1px);box-shadow:0 6px 20px rgba(225,6,0,0.35)}
.m-ig-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transform:skewX(8deg)}

/* — FOOTER — */
.m-footer{
  max-width:var(--max-w);margin:0 auto;
  padding:60px 20px 80px;
  text-align:center;
}
.m-footer-line{
  height:1px;
  background:linear-gradient(to right, transparent, var(--acc), transparent);
  margin-bottom:40px;opacity:0.4;
}
.m-footer-back{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--fu);font-size:16px;letter-spacing:2px;
  text-transform:uppercase;
  color:var(--acc);
  border:1px solid var(--acc);
  padding:12px 28px;border-radius:6px;
  transition:all 0.25s;
}
.m-footer-back:hover{
  background:var(--acc);color:#fff;
  box-shadow:0 4px 20px rgba(225,6,0,0.3);
}
.m-footer-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.m-footer-copy{
  margin-top:32px;
  font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;
  font-family:var(--fi);
}

/* — ERROR STATE — */
.m-error{
  padding:120px 20px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.m-error-icon{
  width:64px;height:64px;
  border:2px solid rgba(255,255,255,0.08);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.m-error-icon svg{width:28px;height:28px;stroke:var(--acc);fill:none;stroke-width:1.5}
.m-error h1{
  font-family:var(--fu);font-size:28px;color:#fff;
  text-transform:uppercase;letter-spacing:1px;
}
.m-error p{color:var(--dim);font-size:15px;max-width:400px;line-height:1.6}
.m-error-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--acc);color:#fff;
  font-family:var(--fu);font-size:14px;letter-spacing:2px;
  padding:12px 28px;border-radius:6px;
  text-transform:uppercase;
  transition:transform 0.2s,box-shadow 0.2s;
  margin-top:8px;
}
.m-error-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(225,6,0,0.3)}

/* — RESPONSIVE — */
@media(max-width:640px){
  .dn-header{height:50px}
  .dn-logo-driver{font-size:18px}
  .dn-logo-news{font-size:10px}
  .dn-logo-icon{width:28px;height:28px}
  .dn-logo-icon svg{width:15px;height:15px}
  .dn-back span{display:none}
  .m-hero{padding:32px 16px 0}
  .m-title{letter-spacing:0}
  .m-content{padding:0 16px}
  .m-footer{padding:48px 16px 60px}
  .m-body{font-size:1rem}
  .m-body p:first-of-type::first-letter{font-size:2.6em}
  .m-author-img{width:34px;height:34px}
  .m-author-name{font-size:13px}
  .m-meta-date,.m-meta-views{font-size:12px}
}
</style>
</head>
<body>

<!-- ════ STICKY HEADER ════ -->
<header class="dn-header">
  <div class="dn-header-inner">
    <a href="/" class="dn-logo">
      <div class="dn-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
      </div>
      <div class="dn-logo-text">
        <span class="dn-logo-driver">Driver</span>
        <span class="dn-logo-news">News</span>
      </div>
    </a>
    <a href="/" class="dn-back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>Voltar ao Portal</span>
    </a>
  </div>
</header>

<!-- ════ ARTICLE CONTAINER ════ -->
<div id="articleContainer">
  <div class="dn-loader">
    <div class="dn-loader-ring"></div>
  </div>
</div>

<!-- ════ SCRIPTS ════ -->
<script src="/js/core.js"></script>
<script src="/js/state.js?v=20260419b"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const articleId = params.get('id');

  function renderError() {
    document.getElementById('articleContainer').innerHTML = `
      <div class="m-error">
        <div class="m-error-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <h1>Matéria Não Encontrada</h1>
        <p>O conteúdo que você procura foi removido pelo autor ou nunca existiu nesta plataforma.</p>
        <a href="/" class="m-error-btn">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Voltar à Capa
        </a>
      </div>
    `;
  }

  if (!articleId) {
    renderError();
  } else {
    async function loadArticleData() {
      // 1. Tentar ler do cache local
      let a = Driver.getArticleById(articleId);
      
      // 2. Se não encontrou no cache, força a comunicação com a API remota!
      if (!a) {
         try {
           await Driver.bootSupabase();
           a = Driver.getArticleById(articleId);
         } catch(e) {
           console.warn('Erro ao carregar banco remoto:', e);
         }
      }

      if (a) {
        // Increment views
        Driver.updateArticle(a.id, { views: (a.views || 0) + 1 });
        a.views = (a.views || 0) + 1;

        const author = Driver.getUserById(a.authorId);
        const authorName = author ? author.name : 'Redação Driver News';
        const authorSlug = author ? (author.slug || author.id) : '';
        const authorImg = author ? (author.avatar_url || '') : '';
        const isVerified = author && author.plan && author.plan !== 'free';
        const verifyBadge = isVerified ? '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--acc);fill:none;stroke-width:2;display:inline-block;vertical-align:middle;margin-left:4px;margin-top:-2px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : '';
        const pubDate = Driver.formatDate(a.publishedAt || a.submittedAt || new Date().toISOString());
        
        document.title = a.title + ' — Driver News';

        const avatarHtml = authorImg
          ? '<img src="'+authorImg+'" class="m-author-img" alt="" onerror="this.style.display=\'none\'">'
          : '<div class="m-author-img" style="display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:16px;color:var(--fg);background:var(--bg2)">'+(authorName.substring(0,2).toUpperCase())+'</div>';

        const igBtn = (author && author.instagram)
          ? '<a href="https://instagram.com/' + author.instagram.replace('@','') + '" target="_blank" class="m-ig-btn"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5"/></svg> Seguir</a>'
          : '';

        document.getElementById('articleContainer').innerHTML = `
          <!-- HERO -->
          <section class="m-hero">
            <div class="m-hero-inner">
              <span class="m-cat">${a.category || 'Notícia'}</span>
              <div class="m-race-line"></div>
              <h1 class="m-title">${a.title}</h1>
              <div class="m-meta">
                <a class="m-author-link" href="/piloto.html?id=${authorSlug}" title="Ver perfil de ${authorName}">
                  ${avatarHtml}
                  <span class="m-author-name">${authorName}${verifyBadge}</span>
                </a>
                <span class="m-meta-sep">·</span>
                <span class="m-meta-date">${pubDate}</span>
                <span class="m-meta-sep">·</span>
                <span class="m-meta-views">${(a.views || 0).toLocaleString()} views</span>
                ${igBtn}
              </div>
            </div>
          </section>

          <!-- HERO IMAGE -->
          ${a.img && a.img !== 'null' ? '<div class="m-hero-img-wrap"><img src="'+a.img+'" class="m-content-img" alt="" onerror="this.parentElement.style.display=\'none\'"></div>' : ''}

          <!-- ARTICLE BODY -->
          <main class="m-content">
            <article class="m-body">
              ${a.body || '<p>O conteúdo completo desta matéria não está disponível.</p>'}
            </article>
          </main>

          <!-- ARTICLE FOOTER -->
          <div class="m-footer">
            <div class="m-footer-line"></div>
            <a href="/" class="m-footer-back">
              <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              Voltar ao Portal
            </a>
            <div class="m-footer-copy">Driver News © 2026</div>
          </div>
        `;
      } else {
        renderError();
      }
    }
    
    loadArticleData();
  }
</script>
</body>
</html>

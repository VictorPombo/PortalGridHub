<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Piloto — Driver News</title>
<meta name="description" content="Perfil profissional de piloto na Driver News. Conheça a trajetória e patrocine.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
<link rel="stylesheet" href="css/core.css?v=20260420">
<link rel="stylesheet" href="css/carbon.css">
<link rel="stylesheet" href="css/homepage.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="carbon-bg">
<div class="progress" id="pgbar"></div>
<button class="btt" id="btt" onclick="scrollToTop()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg></button>
<div class="toast-wrap" id="toastWrap"></div>

<!-- NAV -->
<nav class="carbon-subtle">
  <div class="nav-inner">
    <a class="logo dn-logo" href="index.html">
      <div class="dn-logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="dn-logo-text"><div class="dn-logo-driver">DRIVER</div><div class="dn-logo-news">NEWS</div></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="piloto.html" class="active">Pilotos</a></li>
      <li><a href="index.html?view=plans">Planos</a></li>
    </ul>
    <div class="nav-right" id="navRight">
      <a href="cadastro.html" class="btn-nav-action">Entrar</a>
    </div>
  </div>
</nav>

<!-- Content rendered by JS -->
<div id="pilotContent"></div>

<!-- FOOTER -->
<footer class="carbon-subtle">
  <div class="f-inner">
    <div class="f-grid">
      <div><div class="f-logo"><img src="images/logo.png" alt="Driver News"></div><p class="f-desc">Mídia digital de automobilismo. Plataforma profissional para pilotos, equipes e categorias.</p></div>
      <div class="f-col"><h4>Plataforma</h4><ul><li><a href="index.html?view=plans">Planos</a></li><li><a href="cadastro.html">Cadastro</a></li></ul></div>
      <div class="f-col"><h4>Legal</h4><ul><li><a href="politica.html">Privacidade</a></li><li><a href="termos.html">Termos</a></li></ul></div>
    </div>
    <div class="f-bottom"><div class="f-copy">© 2026 DRIVER MEDIA</div><div class="f-love">FEITO COM ❤ PARA QUEM AMA O ESPORTE</div></div>
  </div>
</footer>

<script src="js/core.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/state.js?v=20260420"></script>
<script>
// Aguarda o banco Sincronizar antes de buscar ID ou renderizar (evita cache vazio)
(function initPage() {
  // Get pilot ID from URL
  const params = new URLSearchParams(window.location.search);
  const pilotId = params.get('id');

  function render(pilot) {
    if (!pilot || pilot.type !== 'piloto') {
      renderPilotsList();
    } else {
      renderPilotPage(pilot);
    }
  }

  // FIRST RENDER: Cache
  if (pilotId) {
    let p = Driver.getUserById(pilotId);
    if (p) render(p);
  } else {
    renderPilotsList();
  }

  // BACKGROUND UPDATE
  Driver.bootSupabase().then(() => {
    let p2 = pilotId ? Driver.getUserById(pilotId) : null;
    if (pilotId && p2) renderPilotPage(p2);
    else if (!pilotId) renderPilotsList();
  }).catch(()=>{});

  // Update nav se estiver logado
  if (Driver.isLoggedIn()) {
    const u = Driver.getCurrentUser();
    const dash = u.type === 'equipe' ? 'dashboard-equipe.html' : u.type === 'categoria' ? 'dashboard-categoria.html' : 'dashboard-piloto.html';
    const isOwner = u.id === pilotId;
    
    // Se é o dono vendo sua própria página, simplifica a nav
    if (isOwner) {
      document.querySelector('.nav-links').innerHTML = `
        <li><a href="index.html">Portal</a></li>
      `;
    }
    
    document.getElementById('navRight').innerHTML = `
      <span style="font-family:var(--fm);font-size:10px;color:var(--dim)">${u.name}</span>
      <a href="${dash}" class="btn-nav-action">Meu Painel</a>
    `;
  }
})();

function renderPilotsList() {
  const pilots = Driver.getUsersByType('piloto');
  document.title = 'Pilotos — Driver News';
  document.getElementById('pilotContent').innerHTML = `
    <div class="page-header racing-stripe">
      <div class="container">
        <div class="breadcrumb"><a href="index.html">DRIVER</a> / PILOTOS</div>
        <h1>Pilotos Cadastrados</h1>
        <p class="subtitle">${pilots.length} pilotos ativos na plataforma</p>
      </div>
    </div>
    <div class="section">
      <div class="pilots-grid">
        ${pilots.map(p => {
          const articles = Driver.getPublishedByAuthor(p.id);
          return `<div class="pilot-card ${articles.length > 0 ? 'card-featured' : ''}" onclick="window.location='piloto.html?id=${p.id}'" style="cursor:pointer">
            <div class="pilot-card-img">
              <img src="${p.avatar_url || p.cover_url || 'https://images.unsplash.com/photo-1541344983572-c511a5fe03fd?auto=format&fit=crop&w=600&q=80'}" alt="${p.name}" style="object-fit:cover">
              <span class="pilot-card-num">#${p.number || '00'}</span>
            </div>
            <div class="pilot-card-body">
              <div class="pilot-card-name">${p.name}</div>
              <div class="pilot-card-cat">${p.category || 'Automobilismo'} · Brasil</div>
              <div class="pilot-card-stats" style="grid-template-columns:1fr">
                <div class="pilot-card-stat"><span class="pilot-card-stat-val">${articles.length}</span><span class="pilot-card-stat-lbl">Matérias Publicadas</span></div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:32px">
        <a href="cadastro.html" class="btn-primary skew glow-acc">Cadastre-se como Piloto →</a>
      </div>
    </div>
  `;
}

function renderPilotPage(p) {
  let spList = [];
  try {
    if (p.sponsors) {
      if (p.sponsors.trim().startsWith('[')) {
        spList = JSON.parse(p.sponsors);
      } else {
        spList = p.sponsors.split(',').map(s => ({ name: s.trim() })).filter(s => s.name);
      }
    }
  } catch(e) {}

  if (p.sponsors_list && Array.isArray(p.sponsors_list) && p.sponsors_list.length > 0) {
    spList = p.sponsors_list;
  }

  const articles = Driver.getPublishedByAuthor(p.id);
  const stats = Driver.getUserStats(p.id);
  const conquests = p.conquests || {};
  document.title = p.name + ' — Driver News';

  // If current user is viewing their own page, show edit link
  const isOwner = Driver.isLoggedIn() && Driver.getCurrentUser()?.id === p.id;

  document.getElementById('pilotContent').innerHTML = `
    <div class="pilot-hero">
      <img class="pilot-hero-bg" src="${p.cover_url || p.avatar_url || 'https://images.unsplash.com/photo-1541344983572-c511a5fe03fd?auto=format&fit=crop&w=1400&q=80'}" alt="" style="object-fit:cover">
      <div class="pilot-hero-overlay"></div>
      <div class="pilot-hero-number">${p.number || '00'}</div>
      <div class="pilot-hero-content">
        <span class="pilot-hero-flag">${p.flag || '🇧🇷'}</span>
        <h1 class="pilot-hero-name">${p.name}</h1>
        <div class="pilot-hero-category">${p.category || 'Automobilismo'} · Piloto ${Driver.getPlanName(p.plan)}</div>
        <div class="pilot-hero-social">
          ${p.instagram ? `<a href="https://instagram.com/${p.instagram.replace('@','')}" target="_blank" class="f-soc" title="Instagram">IG</a>` : ''}
          ${p.twitter ? `<a href="https://x.com/${p.twitter.replace('@','')}" target="_blank" class="f-soc" title="Twitter/X">X</a>` : ''}
          ${isOwner ? `<a href="dashboard-piloto.html?sec=profile" class="btn-secondary" style="padding:6px 12px;font-size:10px;margin-left:8px"><i class="fi fi-rr-pencil"></i> Editar Página</a>` : ''}
        </div>
      </div>
    </div>

    <!-- Conquests -->
    <div class="pilot-section">
      <div class="sec-head"><span class="sec-title">Títulos e Conquistas</span></div>
      <div class="pilot-conquests" style="display:flex;gap:12px;align-items:center;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:24px;">
        <div class="pilot-conquest" style="flex-shrink:0;margin:0;background:none;border:none"><span class="pilot-conquest-icon"><i data-lucide="trophy" style="width:24px;height:24px;display:inline-block;vertical-align:text-bottom"></i></span><span class="pilot-conquest-val" style="font-size:32px">${conquests.titles || 0}</span><span class="pilot-conquest-lbl" style="font-size:12px">Títulos</span></div>
        ${conquests.titles_desc ? `<div style="flex:1;border-left:1px solid var(--brd);padding-left:24px;font-size:15px;color:var(--dim);line-height:1.4">${conquests.titles_desc}</div>` : ''}
      </div>
    </div>

    <!-- Bio -->
    <div class="pilot-section">
      <div class="sec-head"><span class="sec-title">Biografia</span></div>
      <div class="pilot-bio">
        <p>${p.bio || 'Perfil em construção — o piloto ainda não adicionou sua biografia.'}</p>
        ${p.instagram ? `<a href="https://instagram.com/${p.instagram.replace('@','')}" target="_blank" class="btn-primary skew glow-acc" style="display:inline-block;margin-top:24px;font-size:12px;padding:12px 24px"><i data-lucide="instagram" style="width:14px;height:14px;display:inline-block;vertical-align:text-bottom;margin-right:6px"></i> Seguir ${p.name} no Instagram</a>` : ''}
      </div>
    </div>

    <!-- Gallery -->
    <div class="pilot-section">
      <div class="sec-head"><span class="sec-title">Galeria</span></div>
      <div class="pilot-gallery">
        ${(p.gallery && p.gallery.length > 0) ? p.gallery.map(url => `
          <div class="pilot-gallery-item"><img src="${url}" alt="" style="object-fit:cover"></div>
        `).join('') : '<div style="color:var(--dim);text-align:center;padding:24px;width:100%;font-size:14px">O piloto ainda não disponibilizou fotos na galeria pública.</div>'}
      </div>
    </div>

    <!-- Published Articles -->
    <div class="pilot-section">
      <div class="sec-head">
        <span class="sec-title">Matérias Publicadas</span>
        <span class="badge piloto" style="margin-left:8px">Conteúdo Patrocinado · ${articles.length} matérias</span>
      </div>
      ${articles.length > 0 ? `
        <div class="card-grid" style="grid-template-columns:repeat(3,1fr)">
          ${articles.map(a => `
            <div class="ncard" onclick="window.location='/materia.html?id=${a.slug || a.id}'" style="cursor:pointer">
              <div class="ncard-thumb">${a.img ? `<img src="${a.img}" alt="">` : '<div style="height:100%;background:var(--bg3)"></div>'}</div>
              <div class="ncard-body">
                <span class="badge" style="background:var(--info);font-size:8px">Matéria</span>
                <div class="ncard-title">${a.title}</div>
                <div class="ncard-excerpt">${a.brief || ''}</div>
                <div class="ncard-footer">
                  <div class="ncard-meta"><span>${Driver.formatDate(a.publishedAt)} · ${a.views.toLocaleString()} views</span></div>
                  <span style="font-size:10px;font-family:var(--fu);font-weight:700;color:var(--acc);letter-spacing:1px;text-transform:uppercase">Ler Notícia <i class="fi fi-rr-arrow-right" style="vertical-align:middle"></i></span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : `
        <div style="padding:32px;text-align:center;background:var(--bg1);border:1px solid var(--brd);color:var(--muted);font-size:13px">
          Nenhuma matéria publicada ainda. ${isOwner ? '<a href="dashboard-piloto.html" style="color:var(--acc)">Publicar primeira matéria →</a>' : ''}
        </div>
      `}
    </div>

    <!-- Sponsors -->
    <div class="pilot-section">
      <div class="sec-head"><span class="sec-title">Patrocinadores Oficiais</span></div>
      ${(spList && spList.length > 0) ? `
        <div class="sponsors-grid" style="display:flex;gap:16px;flex-wrap:wrap">
          ${spList.map(s => `
            <div style="background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:24px;text-align:center;width:calc(33.333% - 11px);min-width:180px">
              ${s.logo ? `<img src="${s.logo}" style="height:48px;max-width:100%;object-fit:contain;margin-bottom:16px">` : `<div style="height:48px;width:48px;border-radius:50%;background:var(--bg3);margin:0 auto 16px;display:flex;align-items:center;justify-content:center"><i data-lucide="shield" style="width:20px;height:20px;color:var(--dim)"></i></div>`}
              <div style="font-family:var(--fu);font-weight:700;font-size:14px;color:#fff">${s.name}</div>
              ${s.desc ? `<div style="font-size:12px;color:var(--dim);margin-top:6px">${s.desc}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : `
        <div style="color:var(--dim);text-align:center;padding:24px;width:100%;font-size:14px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;">Sem patrocinadores cadastrados no momento.</div>
      `}
    </div>
  `;

  setTimeout(() => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }, 100);
}
</script>
</body>
</html>
